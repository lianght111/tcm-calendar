version: '1.0'
name: master-pipeline
displayName: MasterPipeline
triggers:
  push:
    branches:
      include:
        - master
stages:
  - stage:
    name: build
    displayName: 构建 Android APK
    steps:
      - step: build@nodejs
        name: prepare
        displayName: 安装依赖 & 同步 Capacitor
        nodeVersion: 20
        commands:
          - npm install
          - mkdir -p www
          - cp -r css js icons index.html manifest.json www/
          - npx cap sync android
      - step: build@gradle
        name: build_apk
        displayName: 编译 APK
        jdkVersion: 17
        gradleVersion: 8.2.1
        commands:
          - cd android
          - chmod +x gradlew
          - ./gradlew assembleDebug
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - android/app/build/outputs/apk/debug/app-debug.apk
        dependsOn: prepare
      - step: publish@general_artifacts
        name: upload_apk
        displayName: 上传 APK 制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: tcm-calendar-apk
        dependsOn: build_apk
