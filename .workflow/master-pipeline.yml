version: '1.0'
name: master-pipeline
displayName: MasterPipeline
triggers:
  push:
    branches:
      include:
        - master
stages:
  - stage:
    name: build
    displayName: 构建 Android APK
    steps:
      - step: shell
        name: setup_env
        displayName: 准备构建环境
        script:
          - apt-get update -qq && apt-get install -y -qq curl unzip > /dev/null
          - |
            if [ ! -d "$HOME/android-sdk" ]; then
              ANDROID_SDK_ROOT=$HOME/android-sdk
              mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
              cd $ANDROID_SDK_ROOT/cmdline-tools
              curl -fsSL -o tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
              unzip -q tools.zip
              mv cmdline-tools latest
              yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-34" "build-tools;34.0.0" "platform-tools"
            fi
          - echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHOOKS_ENV
          - echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHOOKS_ENV
      - step: shell
        name: install_deps
        displayName: 安装 npm 依赖
        script:
          - npm install
      - step: shell
        name: prepare_web
        displayName: 准备 Web 资源
        script:
          - mkdir -p www
          - cp -r css js icons index.html manifest.json www/
      - step: shell
        name: cap_sync
        displayName: 同步 Capacitor
        script:
          - npx cap sync android
      - step: shell
        name: build_apk
        displayName: 编译 Debug APK
        script:
          - cd android
          - chmod +x gradlew
          - ./gradlew assembleDebug
      - step: publish@general_artifacts
        name: upload_apk
        displayName: 上传 APK 制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        dependsOn: build_apk
