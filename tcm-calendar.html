<title>中医日历</title>
<style>
/* ===== 基础样式与变量 ===== */
:root {
    --bg-primary: #f8f5f0;
    --bg-secondary: #fffef9;
    --bg-card: #ffffff;
    --bg-sidebar: #2c2416;
    --text-primary: #3d3226;
    --text-secondary: #6b5e4a;
    --text-sidebar: #e8dcc8;
    --text-light: #9b8c7a;
    --border-color: #e0d5c1;
    --accent: #c4953a;
    --accent-light: #e8c97a;
    --wood: #5a9e4b;
    --fire: #c0392b;
    --earth: #d49532;
    --metal: #b8a05e;
    --water: #2c5f8a;
    --yin-bg: #e8f0fe;
    --yang-bg: #fff3e0;
    --solar-term: #27ae60;
    --today-bg: #fff8e1;
    --today-border: #c4953a;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.15);
    --radius: 10px;
    --radius-sm: 6px;
    --transition: all 0.3s ease;
}

[data-theme="dark"] {
    --bg-primary: #1a1814;
    --bg-secondary: #221f18;
    --bg-card: #2a261e;
    --bg-sidebar: #14120e;
    --text-primary: #e8dcc8;
    --text-secondary: #b8a88a;
    --text-sidebar: #c8b898;
    --text-light: #8a7a60;
    --border-color: #3a3226;
    --accent: #d4a84b;
    --accent-light: #c89838;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.5);
    --yin-bg: #1a2740;
    --yang-bg: #3a2010;
    --today-bg: #2a2418;
    --today-border: #d4a84b;
}

/* ===== 全局样式 ===== */
*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Hiragino Sans GB", sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: var(--transition);
}

.app-container {
    display: flex;
    min-height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
}

/* ===== 侧边栏 ===== */
.sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--bg-sidebar);
    color: var(--text-sidebar);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    transition: var(--transition);
    z-index: 100;
}

.sidebar-header h2 {
    font-size: 1.4em;
    margin-bottom: 4px;
    color: var(--accent-light);
}

.sidebar-header .subtitle {
    font-size: 0.85em;
    opacity: 0.7;
}

.sidebar-section h3 {
    font-size: 0.9em;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    color: var(--accent-light);
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 6px;
}

.sidebar-section .info-item {
    font-size: 0.82em;
    line-height: 1.7;
    opacity: 0.85;
}

.sidebar-section .info-item .label {
    color: var(--accent-light);
    margin-right: 4px;
}

.btn-sidebar {
    display: block;
    width: 100%;
    padding: 10px 16px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-sidebar);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.85em;
    transition: var(--transition);
    text-align: left;
}

.btn-sidebar:hover {
    background: rgba(255,255,255,0.15);
    border-color: var(--accent-light);
}

/* ===== 主内容 ===== */
.main-content {
    flex: 1;
    padding: 16px 24px;
    overflow-y: auto;
    transition: var(--transition);
}

/* ===== 顶部导航 ===== */
.calendar-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}

.calendar-header h1 {
    font-size: 1.5em;
    font-weight: 600;
    min-width: 200px;
    text-align: center;
    color: var(--text-primary);
}

.nav-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--border-color);
    background: var(--bg-card);
    cursor: pointer;
    font-size: 1.1em;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-primary);
    transition: var(--transition);
    box-shadow: var(--shadow);
}

.nav-btn:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}

#menu-toggle {
    position: absolute;
    left: 16px;
}

/* ===== 图例 ===== */
.legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 12px;
    padding: 10px 16px;
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    font-size: 0.78em;
    justify-content: center;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--text-secondary);
}

.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
}

.solar-term-dot { background: var(--solar-term); }
.jieqi-dot { background: var(--accent); }
.wuxing-dot.wood { background: var(--wood); }
.wuxing-dot.fire { background: var(--fire); }
.wuxing-dot.earth { background: var(--earth); }
.wuxing-dot.metal { background: var(--metal); }
.wuxing-dot.water { background: var(--water); }

/* ===== 星期标题 ===== */
.weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 2px;
}

.weekday {
    text-align: center;
    padding: 10px 4px;
    font-weight: 600;
    font-size: 0.85em;
    color: var(--text-secondary);
    background: var(--bg-card);
    border-radius: var(--radius-sm);
}

.weekday:first-child {
    color: #c0392b;
}

.weekday:last-child {
    color: #c0392b;
}

/* ===== 日历网格 ===== */
.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
}

.day-cell {
    aspect-ratio: 1;
    min-height: 90px;
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    padding: 6px;
    cursor: pointer;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 2px solid transparent;
}

.day-cell:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
    z-index: 10;
    border-color: var(--accent-light);
}

.day-cell.other-month {
    opacity: 0.35;
    background: var(--bg-secondary);
}

.day-cell.today {
    border-color: var(--today-border) !important;
    background: var(--today-bg);
    box-shadow: 0 0 0 2px var(--today-border);
    z-index: 5;
}

.day-cell.weekend {
    background: #fef5f5;
}

[data-theme="dark"] .day-cell.weekend {
    background: #2a1a1a;
}

.day-cell .solar-date {
    font-size: 1.1em;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
}

.day-cell.today .solar-date {
    color: var(--accent);
}

.day-cell .ganzhi {
    font-size: 0.7em;
    color: var(--text-secondary);
    margin-top: 2px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.day-cell .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin-top: auto;
}

.day-cell .tag {
    font-size: 0.58em;
    padding: 1px 4px;
    border-radius: 3px;
    white-space: nowrap;
    line-height: 1.4;
    font-weight: 600;
}

.tag.solar-term {
    background: #d5f5e3;
    color: #1a7a3a;
}

<script>
/**
 * calendar.js - 干支计算、节气计算、五运六气计算
 */

// =================== 缓存 ===================
const _solarTermCache = {};
const _dayGZCache = {};

// =================== 干支计算 ===================

/**
 * 计算年干支
 * 以立春为界，立春前属上一年
 */
function getYearGanZhi(date) {
    const year = date.getFullYear();
    const solarTerms = getSolarTermDates(year);
    const liChun = solarTerms[2]; // 立春索引

    let effectiveYear = year;
    if (date < liChun) {
        effectiveYear = year - 1;
    }

    const ganIdx = (effectiveYear - 4) % 10;
    const zhiIdx = (effectiveYear - 4) % 12;
    return {
        gan: TIAN_GAN[ganIdx < 0 ? ganIdx + 10 : ganIdx],
        zhi: DI_ZHI[zhiIdx < 0 ? zhiIdx + 12 : zhiIdx],
        ganzhi: TIAN_GAN[ganIdx < 0 ? ganIdx + 10 : ganIdx] + DI_ZHI[zhiIdx < 0 ? zhiIdx + 12 : zhiIdx],
        ganIdx: ganIdx < 0 ? ganIdx + 10 : ganIdx,
        zhiIdx: zhiIdx < 0 ? zhiIdx + 12 : zhiIdx,
        sexagenaryNum: getSexagenaryNum(ganIdx < 0 ? ganIdx + 10 : ganIdx, zhiIdx < 0 ? zhiIdx + 12 : zhiIdx)
    };
}

/**
 * 计算月干支
 * 以节气为月界：立春=寅月，惊蛰=卯月，清明=辰月...
 * 五虎遁：甲己之年丙作首，乙庚之岁戊为头，丙辛必定寻庚起，丁壬壬位顺行流，若问戊癸何方发，甲寅之上好追求
 */
function getMonthGanZhi(date) {
    const year = date.getFullYear();
    const solarTerms = getSolarTermDates(year);
    const prevYearTerms = getSolarTermDates(year - 1);
    const liChunThisYear = solarTerms[2];
    const xiaoHanThisYear = solarTerms[0];

    // 节气月界定：
    // 小寒→丑月, 立春→寅月, 惊蛰→卯月, ..., 大雪→子月
    // 节索引 -> 月: 0→11(丑),2→0(寅),4→1(卯),6→2(辰),8→3(巳),
    //                   10→4(午),12→5(未),14→6(申),16→7(酉),
    //                   18→8(戌),20→9(亥),22→10(子)

    let lunarMonthIdx = 0;
    let effectiveYear = year;

    if (date >= liChunThisYear) {
        // 立春及之后 → 属于本年干支年
        effectiveYear = year;
        // 从索引22(大雪)开始倒查，找到最近的节
        const jieIndices = [22, 20, 18, 16, 14, 12, 10, 8, 6, 4, 2];
        const jieToMonth = { 22: 10, 20: 9, 18: 8, 16: 7, 14: 6, 12: 5, 10: 4, 8: 3, 6: 2, 4: 1, 2: 0 };
        for (const j of jieIndices) {
            if (date >= solarTerms[j]) {
                lunarMonthIdx = jieToMonth[j];
                break;
            }
        }
        // 默认立春 → 寅月(0)
    } else if (date >= xiaoHanThisYear) {
        // 小寒后、立春前 → 属于上年干支年的丑月
        effectiveYear = year - 1;
        lunarMonthIdx = 11;
    } else {
        // 小寒之前 → 属于上年干支年，需要查找到对应的月
        effectiveYear = year - 1;
        // 首先查看上一年12月的大雪
        const prevDaXue = prevYearTerms[22];
        if (date >= prevDaXue) {
            lunarMonthIdx = 10; // 子月
        } else {
            // 继续往前查（上一年12月前还有其他月）
            const jieIndices = [20, 18, 16, 14, 12, 10, 8, 6, 4, 2];
            const jieToMonth = { 20: 9, 18: 8, 16: 7, 14: 6, 12: 5, 10: 4, 8: 3, 6: 2, 4: 1, 2: 0 };
            let found = false;
            for (const j of jieIndices) {
                if (date >= prevYearTerms[j]) {
                    lunarMonthIdx = jieToMonth[j];
                    found = true;
                    break;
                }
            }
            if (!found) {
                // 在去年立春之前（极罕见，1月初），也属于子月
                lunarMonthIdx = 10;
            }
        }
    }

    // 五虎遁：根据年干计算月干起首
    const yearGanIdx = (effectiveYear - 4) % 10;
    const adjustedYearGanIdx = yearGanIdx < 0 ? yearGanIdx + 10 : yearGanIdx;

    // 五虎遁规则：(年干对应的寅月天干)
    // 甲己 → 丙寅, 乙庚 → 戊寅, 丙辛 → 庚寅, 丁壬 → 壬寅, 戊癸 → 甲寅
    const huDunStart = [2, 4, 6, 8, 0]; // 甲/己→2(丙), 乙/庚→4(戊), 丙/辛→6(庚), 丁/壬→8(壬), 戊/癸→0(甲)
    const groupIdx = Math.floor(adjustedYearGanIdx / 2); // 0=甲己, 1=乙庚, 2=丙辛, 3=丁壬, 4=戊癸
    const monthGanIdx = (huDunStart[groupIdx] + lunarMonthIdx) % 10;
    const monthZhiIdx = (lunarMonthIdx + 2) % 12; // 寅=2

    return {
        gan: TIAN_GAN[monthGanIdx],
        zhi: DI_ZHI[monthZhiIdx],
        ganzhi: TIAN_GAN[monthGanIdx] + DI_ZHI[monthZhiIdx],
        ganIdx: monthGanIdx,
        zhiIdx: monthZhiIdx,
        lunarMonth: lunarMonthIdx + 1
    };
}

/**
 * 计算日干支
 * 基准: 1900年1月1日 = 甲戌日 (60甲子序号: 10)
 */
function getDayGanZhi(date) {
    // 计算从1900-01-01到目标日期的天数
    const baseDate = new Date(1900, 0, 1);
    const targetDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const diffTime = targetDate.getTime() - baseDate.getTime();
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    // 1900-01-01是甲戌日，60甲子序号为10
    const cycleDay = ((diffDays % 60) + 10 + 60) % 60;

    const ganIdx = cycleDay % 10;
    const zhiIdx = cycleDay % 12;

    return {
        gan: TIAN_GAN[ganIdx],
        zhi: DI_ZHI[zhiIdx],
        ganzhi: TIAN_GAN[ganIdx] + DI_ZHI[zhiIdx],
        ganIdx: ganIdx,
        zhiIdx: zhiIdx,
        sexagenaryNum: cycleDay
    };
}

/**
 * 计算时干支
 * 五鼠遁：甲己还加甲，乙庚丙作初，丙辛从戊起，丁壬庚子居，戊癸何方发，壬子是真途
 */
function getHourGanZhi(date, hour) {
    const dayGZ = getDayGanZhi(date);

    else if (hour >= 5 && hour < 7) shiChenIdx = 3;   // 卯时
    else if (hour >= 7 && hour < 9) shiChenIdx = 4;   // 辰时
    else if (hour >= 9 && hour < 11) shiChenIdx = 5;  // 巳时
    else if (hour >= 11 && hour < 13) shiChenIdx = 6; // 午时
    else if (hour >= 13 && hour < 15) shiChenIdx = 7; // 未时
    else if (hour >= 15 && hour < 17) shiChenIdx = 8; // 申时
    else if (hour >= 17 && hour < 19) shiChenIdx = 9; // 酉时
    else if (hour >= 19 && hour < 21) shiChenIdx = 10; // 戌时
    else if (hour >= 21 && hour < 23) shiChenIdx = 11; // 亥时

    // 五鼠遁：日干对应的子时天干
    // 甲己→甲子, 乙庚→丙子, 丙辛→戊子, 丁壬→庚子, 戊癸→壬子
    const ratDunStart = [0, 2, 4, 6, 8]; // 甲/己→0(甲), 乙/庚→2(丙), ...
    const groupIdx = Math.floor(dayGanIdx / 2);
    const hourGanIdx = (ratDunStart[groupIdx] + shiChenIdx) % 10;

    return {
        gan: TIAN_GAN[hourGanIdx],
        zhi: DI_ZHI[shiChenIdx],
        ganzhi: TIAN_GAN[hourGanIdx] + DI_ZHI[shiChenIdx],
        ganIdx: hourGanIdx,
        zhiIdx: shiChenIdx,
        shiChen: SHI_CHEN[shiChenIdx]
    };
}

/**
 * 获取当前时辰的描述（一个时辰=两小时）

function getCurrentShiChen(date) {

    return hgz;

// =================== 节气计算 ===================

/**
 * 计算太阳黄经的近似值（度数）
 * 使用简化的太阳位置算法
 */
function getSunLongitude(jd) {
    // Julian centuries from J2000.0
    const T = (jd - 2451545.0) / 36525.0;
    const T2 = T * T;
    const T3 = T2 * T;

    // Mean longitude of the sun
    let L0 = 280.46646 + 36000.76983 * T + 0.0003032 * T2;

    // Mean anomaly of the sun
    const M = 357.52911 + 35999.05029 * T - 0.0001537 * T2;
    const Mrad = M * Math.PI / 180.0;

    // Sun's equation of center
    const C = (1.914602 - 0.004817 * T - 0.000014 * T2) * Math.sin(Mrad)
            + (0.019993 - 0.000101 * T) * Math.sin(2 * Mrad)
            + 0.000289 * Math.sin(3 * Mrad);

    // True longitude
    let L = L0 + C;

    // Normalize to [0, 360)
    L = ((L % 360) + 360) % 360;

    return L;
}

/**
 * 计算指定年份的二十四节气日期
 * 使用二分法迭代求解太阳黄经到达指定角度的时刻
 */
function getSolarTermDates(year) {
    if (_solarTermCache[year]) return _solarTermCache[year];

    const terms = [];

    for (let i = 0; i < 24; i++) {
        const targetAngle = SOLAR_TERMS[i].angle;
        const baseMonth = SOLAR_TERMS[i].month;

        // 初始估计：使用通用公式
        const Y = year % 100;
        let estimatedDay = Math.floor(Y * 0.2422 + SOLAR_TERM_C[i]) - Math.floor(Y / 4);

        if (baseMonth === 0 && i >= 22) {
            // 小寒大寒在次年1月
            const nextY = (year + 1) % 100;
            estimatedDay = Math.floor(nextY * 0.2422 + SOLAR_TERM_C[i]) - Math.floor(nextY / 4);
        }

        // 使用二分法精确求解
        const month0 = (baseMonth === 0 && i >= 22) ? 0 : baseMonth;
        const actualYear = (baseMonth === 0 && i >= 22) ? year + 1 : year;

        // 在估算日期前后搜索精确日期
        let bestDate = null;
        let minDiff = Infinity;

        for (let d = estimatedDay - 2; d <= estimatedDay + 2; d++) {
            if (d < 1 || d > 31) continue;

            // 在当天不同时间点尝试（中午12点作为基准）
            const testDate = new Date(actualYear, month0, d, 12, 0, 0);
            const jd = getJulianDay(testDate);
            const actualAngle = getSunLongitude(jd);

            // 计算太阳黄经与目标角度的差值
            let diff = actualAngle - targetAngle;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;

            if (Math.abs(diff) < Math.abs(minDiff)) {
                minDiff = diff;
                bestDate = new Date(actualYear, month0, d);
            }
        }

        // 如果需要更精确，进行日内的二分修正
        if (bestDate && Math.abs(minDiff) > 1.5) {
            // 调整日期
            const adjustDir = minDiff > 0 ? -1 : 1;
            const adjustedDate = new Date(bestDate);
            adjustedDate.setDate(adjustedDate.getDate() + adjustDir);

            const jd2 = getJulianDay(adjustedDate);
            const angle2 = getSunLongitude(jd2);
            let diff2 = angle2 - targetAngle;
            if (diff2 > 180) diff2 -= 360;
            if (diff2 < -180) diff2 += 360;

            if (Math.abs(diff2) < Math.abs(minDiff)) {
                bestDate = adjustedDate;
                minDiff = diff2;
            }
        }

        terms.push(bestDate || new Date(actualYear, month0, estimatedDay));
    }

    _solarTermCache[year] = terms;
    return terms;
}

/**
 * 获取某天所在的节气
 */
function getCurrentSolarTerm(date) {
    const year = date.getFullYear();
    const terms = getSolarTermDates(year);
    const termsNextYear = getSolarTermDates(year + 1);
    const termsPrevYear = getSolarTermDates(year - 1);

    // 合并三年节气数据确保覆盖所有日期
    const allTerms = [...termsPrevYear, ...terms, ...termsNextYear];

    // 找到 date 之前的最后一个节气
    let currentTerm = null;
    for (let i = allTerms.length - 1; i >= 0; i--) {
        if (date >= allTerms[i]) {
            currentTerm = { ...SOLAR_TERMS[i % 24], date: allTerms[i], index: i % 24 };
            break;
        }
    }

    // 找到下一个节气
    let nextTerm = null;
    for (let i = 0; i < allTerms.length; i++) {
        if (date < allTerms[i]) {
            nextTerm = { ...SOLAR_TERMS[i % 24], date: allTerms[i], index: i % 24 };
            break;
        }
    }

    return { current: currentTerm, next: nextTerm };
}

/**
 * 获取指定日期的节气（如果当天是节气）
 */
function getSolarTermOnDate(date) {
    const year = date.getFullYear();
    const terms = getSolarTermDates(year);
    const termsNextYear = getSolarTermDates(year + 1);

    const checkDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());

    for (let i = 0; i < terms.length; i++) {
        const termDate = new Date(terms[i].getFullYear(), terms[i].getMonth(), terms[i].getDate());
        if (checkDate.getTime() === termDate.getTime()) {
            return { ...SOLAR_TERMS[i], date: terms[i] };
        }
    }

    // 检查下一年一月的节气
    for (let i = 0; i < 2; i++) {
        const termDate = new Date(termsNextYear[i].getFullYear(), termsNextYear[i].getMonth(), termsNextYear[i].getDate());
        if (checkDate.getTime() === termDate.getTime()) {
            return { ...SOLAR_TERMS[i], date: termsNextYear[i] };
        }
    }

    return null;
}

/**
 * 计算儒略日
 */
function getJulianDay(date) {
    let y = date.getFullYear();
    let m = date.getMonth() + 1;
    const d = date.getDate() + date.getHours() / 24.0 + date.getMinutes() / 1440.0;

    if (m <= 2) {
        y -= 1;
        m += 12;
    }

    const A = Math.floor(y / 100);
    const B = 2 - A + Math.floor(A / 4);

    return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524.5;
}

// =================== 五运六气计算 ===================

/**
 * 岁运（中运）:
 * 甲己→土运，乙庚→金运，丙辛→水运，丁壬→木运，戊癸→火运
 * 阳干→太过，阴干→不及
 */
function getYearMovement(yearGanZhi) {
    const ganIdx = yearGanZhi.ganIdx;
    // 天干五行对应：甲乙木(0,1), 丙丁火(2,3), 戊己土(4,5), 庚辛金(6,7), 壬癸水(8,9)
    const wuXingMap = [0, 0, 1, 1, 2, 2, 3, 3, 4, 4];
    const wxIdx = wuXingMap[ganIdx];
    const isYang = GAN_YIN_YANG[ganIdx] === 1;

    return {
        name: yearGanZhi.gan + '年',
        wuXing: WU_XING_NAMES[wxIdx],
        wuXingIdx: wxIdx,
        excess: isYang ? '太过' : '不及',
        description: `${yearGanZhi.gan}为${isYang ? '阳' : '阴'}干，${WU_XING_NAMES[wxIdx]}运${isYang ? '太过' : '不及'}`
    };
}

/**
 * 主运（木火土金水，每年固定顺序）
 * 各运主73日5刻
 */
function getHostMovement() {
    return [
        { name: '初运', wuXing: '木', wuXingIdx: 0, period: '大寒至春分后13日' },
        { name: '二运', wuXing: '火', wuXingIdx: 1, period: '春分后13日至芒种后10日' },
        { name: '三运', wuXing: '土', wuXingIdx: 2, period: '芒种后10日至处暑后7日' },
        { name: '四运', wuXing: '金', wuXingIdx: 3, period: '处暑后7日至立冬后4日' },
        { name: '五运', wuXing: '水', wuXingIdx: 4, period: '立冬后4日至大寒' }
    ];
}

/**
 * 客运：以岁运为初运，按五行相生顺序排列
 */
function getGuestMovement(yearMovement) {
    const order = [0, 1, 2, 3, 4]; // 木火土金水顺序
    const startIdx = yearMovement.wuXingIdx;
    const names = ['初运', '二运', '三运', '四运', '五运'];

    const result = [];
    for (let i = 0; i < 5; i++) {
        const wxIdx = (startIdx + i) % 5;
        const isYang = ((i + startIdx + (yearMovement.excess === '太过' ? 1 : 0)) % 2 === 0);
        result.push({
            name: names[i],
            wuXing: WU_XING_NAMES[wxIdx],
            wuXingIdx: wxIdx,
            excess: isYang ? '太过' : '不及'
        });
    }
    return result;
}

/**
 * 主气（六气）：厥阴风木、少阴君火、少阳相火、太阴湿土、阳明燥金、太阳寒水
 * 每气60日87.5刻
 */
function getHostQi() {
    return [
        { name: '初之气', qi: '厥阴风木', wuXing: '木', wuXingIdx: 0, period: '大寒至春分' },
        { name: '二之气', qi: '少阴君火', wuXing: '火', wuXingIdx: 1, period: '春分至小满' },
        { name: '三之气', qi: '少阳相火', wuXing: '火', wuXingIdx: 1, period: '小满至大暑' },
        { name: '四之气', qi: '太阴湿土', wuXing: '土', wuXingIdx: 2, period: '大暑至秋分' },
        { name: '五之气', qi: '阳明燥金', wuXing: '金', wuXingIdx: 3, period: '秋分至小雪' },
        { name: '终之气', qi: '太阳寒水', wuXing: '水', wuXingIdx: 4, period: '小雪至大寒' }
    ];
}

/**
 * 客气：根据年支推算司天在泉
 * 子午→少阴君火司天/阳明燥金在泉
 * 丑未→太阴湿土/太阳寒水
 * 寅申→少阳相火/厥阴风木
 * 卯酉→阳明燥金/少阴君火
 * 辰戌→太阳寒水/太阴湿土
 * 巳亥→厥阴风木/少阳相火
 */
function getGuestQi(yearGanZhi) {
    const zhiIdx = yearGanZhi.zhiIdx;
    const siTianMap = [
        { siTian: '少阴君火', zaiQuan: '阳明燥金' }, // 子午
        { siTian: '太阴湿土', zaiQuan: '太阳寒水' }, // 丑未
        { siTian: '少阳相火', zaiQuan: '厥阴风木' }, // 寅申
        { siTian: '阳明燥金', zaiQuan: '少阴君火' }, // 卯酉
        { siTian: '太阳寒水', zaiQuan: '太阴湿土' }, // 辰戌
        { siTian: '厥阴风木', zaiQuan: '少阳相火' }, // 巳亥
    ];

    const pairIdx = Math.floor(zhiIdx / 2);
    const base = siTianMap[pairIdx];

    // 六气顺序（按三阴三阳排列）
    const qiOrder = [
        '厥阴风木', '少阴君火', '太阴湿土', '少阳相火', '阳明燥金', '太阳寒水'
    ];

    const siTianOrder = qiOrder.indexOf(base.siTian);

    const guestQiList = [];
    const stepNames = ['初之气', '二之气', '三之气', '四之气', '五之气', '终之气'];

    // 客气：以司天为三之气，按三阴三阳顺序排列
    for (let i = 0; i < 6; i++) {
        const offset = (i - 2); // 相对于司天（三之气的位置）
        const qiIdx = ((siTianOrder + offset) % 6 + 6) % 6;
        guestQiList.push({
            name: stepNames[i],
            qi: qiOrder[qiIdx],
            isSiTian: i === 2,
            isZaiQuan: i === 5
        });
    }

    return {
        siTian: base.siTian,
        zaiQuan: base.zaiQuan,
        steps: guestQiList
    };
}

/**
 * 获取当前日期的五运六气详情
 */
function getWuYunLiuQiForDate(date) {
    const year = date.getFullYear();
    const yearGZ = getYearGanZhi(date);
    const yearMovement = getYearMovement(yearGZ);
    const hostMovements = getHostMovement();
    const guestMovements = getGuestMovement(yearMovement);
    const hostQi = getHostQi();
    const guestQi = getGuestQi(yearGZ);

    // 使用实际节气日期来确定运和气
    const currTerms = getSolarTermDates(year);
    const prevTerms = getSolarTermDates(year - 1);

    // 运气周期从大寒开始
    // 运：初运(大寒→春分后13日), 二运(~4/3→~6/15), 三运(~6/15→~8/27), 四运(~8/27→~11/7), 五运(~11/7→大寒)
    // 气：初气(大寒→春分), 二气(春分→小满), 三气(小满→大暑), 四气(大暑→秋分), 五气(秋分→小雪), 终气(小雪→大寒)
    
    const daHan = currTerms[1];       // 大寒
    const chunFen = currTerms[5];     // 春分
    const xiaoMan = currTerms[9];     // 小满
    const daShu = currTerms[13];      // 大暑
    const qiuFen = currTerms[17];     // 秋分
    const xiaoXue = currTerms[21];    // 小雪
    const nextDaHan = getSolarTermDates(year + 1)[1]; // 下一年大寒

    // 运边界：初运~二运(~春分+13天)，大致用惊蛰(春分前1节气)到春分中点近似
    const jingZhe = currTerms[3];     // 惊蛰 ~3/6
    const mangZhong = currTerms[10];  // 芒种 ~6/6
    const chuShu = currTerms[15];     // 处暑 ~8/23
    const liDong = currTerms[19];     // 立冬 ~11/7

    let currentHostMove = hostMovements[0];
    let currentGuestMove = guestMovements[0];
    let currentHostQ = hostQi[0];
    let currentGuestQ = guestQi.steps[0];

    // 判断运
    if (date >= daHan && date < chunFen) {
        // 初运（简化：大寒到春分附近）
        currentHostMove = hostMovements[0];
        currentGuestMove = guestMovements[0];
    } else if (date >= chunFen && date < mangZhong) {
        currentHostMove = hostMovements[1];
        currentGuestMove = guestMovements[1];
    } else if (date >= mangZhong && date < chuShu) {
        currentHostMove = hostMovements[2];
        currentGuestMove = guestMovements[2];
    } else if (date >= chuShu && date < liDong) {
        currentHostMove = hostMovements[3];
        currentGuestMove = guestMovements[3];
    } else {
        currentHostMove = hostMovements[4];
        currentGuestMove = guestMovements[4];
    }

    // 判断气
    if (date >= daHan && date < chunFen) {
        currentHostQ = hostQi[0];
        currentGuestQ = guestQi.steps[0];
    } else if (date >= chunFen && date < xiaoMan) {
        currentHostQ = hostQi[1];
        currentGuestQ = guestQi.steps[1];
    } else if (date >= xiaoMan && date < daShu) {
        currentHostQ = hostQi[2];
        currentGuestQ = guestQi.steps[2];
    } else if (date >= daShu && date < qiuFen) {
        currentHostQ = hostQi[3];
        currentGuestQ = guestQi.steps[3];
    } else if (date >= qiuFen && date < xiaoXue) {
        currentHostQ = hostQi[4];
        currentGuestQ = guestQi.steps[4];
    } else {
        currentHostQ = hostQi[5];
        currentGuestQ = guestQi.steps[5];
    }

    return {
        yearMovement,
        hostMovements,
        guestMovements,
        hostQi,
        guestQi,
        currentHostMove,
        currentGuestMove,
        currentHostQ,
        currentGuestQ
    };
}

/**

 */
function getGanWuXing(ganIdx) {

        const coupleData = LINGGUI_ACUPOINTS[fullInfo.couple];
        const coupleFull = LINGGUI_FULL_INFO[fullInfo.couple];
        coupleInfo = {
            num: fullInfo.couple,
            name: coupleData.name,
            code: coupleData.code,
            meridian: coupleData.meridian,
            trigram: coupleFull.trigram,
            trigramSymbol: coupleFull.trigramSymbol,
            vessel: coupleData.vessel,
            relation: `主客配穴：${acupoint.name}(${acupoint.code}) ↔ ${coupleData.name}(${coupleData.code})`
        };
    }

    return {
        openNum: openNumFinal,
        acupoint: acupoint,
        fullInfo: fullInfo,
        dayBase: dayBaseFinal,
        hourBase: hourBaseFinal,
        calculation: `${dayGanNum}+${dayZhiNum}=${dayGanNum + dayZhiNum} → ${dayBaseFinal}; ${hourGanNum}+${hourZhiNum}=${hourGanNum + hourZhiNum} → ${hourBaseFinal}; ${dayBaseFinal}+${hourBaseFinal}=${openNumFinal}`,
        trigram: fullInfo ? fullInfo.trigram : '',
        trigramName: fullInfo ? fullInfo.trigramName : '',
        trigramSymbol: fullInfo ? fullInfo.trigramSymbol : '',
        couple: coupleInfo,
        description: acupoint ? `${acupoint.name}(${acupoint.code}) - ${acupoint.meridian}，通${acupoint.vessel}，位于${acupoint.location}` : ''
    };
}

/**
 * 子午流注纳甲法 - 根据日干和时辰计算开穴（含互用穴）
 * 原理：按日干取对应时辰的井荥输经合等开穴
 * 互用穴：合日日干的同一时辰穴位
 */
function getZiWuLiuZhuNaJia(date, shiChenGanZhi) {
    const dayGZ = getDayGanZhi(date);
    const dayGan = dayGZ.gan;
    const hourZhiIdx = shiChenGanZhi.zhiIdx;

    const dayPoints = ZIWU_NAJIA_POINTS[dayGan];
    const point = dayPoints ? (dayPoints[hourZhiIdx] || null) : null;

    // 互用穴：取合日日干对应时辰穴位
    const partnerGan = NAJIA_HE_PAIRS[dayGan];
    let huyongPoint = null;
    if (partnerGan) {
        const partnerPoints = ZIWU_NAJIA_POINTS[partnerGan];
        huyongPoint = partnerPoints ? (partnerPoints[hourZhiIdx] || null) : null;
    }

    return {
        mainPoint: point,
        huyongPoint: huyongPoint,
        huyongGan: partnerGan,
        huyongInfo: NAJIA_HUYONG_INFO[dayGan] || '',
        hasHuyong: point === null && huyongPoint !== null
    };
}

/**
 * 子午流注纳子法 - 根据时辰获取本经开穴（含主配穴、五输穴五行、补泻穴）
 */
function getZiWuLiuZhuNaZi(shiChenIdx) {
    if (shiChenIdx < 0 || shiChenIdx >= 12) return null;

    const naziPoint = ZIWU_NAZI_POINTS[shiChenIdx];
    const pairData = NAZI_PAIR_POINTS[shiChenIdx];
    if (!naziPoint || !pairData) return null;

    const isYangMeridian = [0, 3, 4, 7, 8, 11].includes(shiChenIdx);

    // 五输穴五行
    const wellWX = getShuPointWuxing(shiChenIdx, 'well');
    const springWX = getShuPointWuxing(shiChenIdx, 'spring');
    const streamWX = getShuPointWuxing(shiChenIdx, 'stream');
    const riverWX = getShuPointWuxing(shiChenIdx, 'river');
    const seaWX = getShuPointWuxing(shiChenIdx, 'sea');

    return {
        meridian: naziPoint.meridian,
        shiChen: SHI_CHEN[shiChenIdx].name,
        well: { ...naziPoint.well, wuXing: wellWX },
        spring: { ...naziPoint.spring, wuXing: springWX },
        stream: { ...naziPoint.stream, wuXing: streamWX },
        river: { ...naziPoint.river, wuXing: riverWX },
        sea: { ...naziPoint.sea, wuXing: seaWX },
        yuan: naziPoint.yuan,
        isYangMeridian: isYangMeridian,
        mainPoint: pairData.main,
        accompanyPoint: pairData.accompany,
        supplementPoint: pairData.supplement,
        drainPoint: pairData.drain,
        description: `${SHI_CHEN[shiChenIdx].name} ${naziPoint.meridian}当令，主穴${pairData.main.name}(${pairData.main.code})，配穴${pairData.accompany.name}(${pairData.accompany.code})`
    };
}

/**
 * 五门十变 - 根据日干计算合化关系
 * 天干合化 → 对应经络互用
 */
function getWuMenShiBian(date) {
    const dayGZ = getDayGanZhi(date);
    const dayGan = dayGZ.gan;
    const info = WUMEN_HE_INFO[dayGan];
    if (!info) return null;

    // 获取合化干支对应的经络五输穴
    const partnerGan = info.partnerGan;

    return {
        dayGan: dayGan,
        partnerGan: partnerGan,
        huaWuxing: info.huaWuxing,
        meridian1: info.meridian1,
        meridian2: info.meridian2,
        description: info.desc,
        formula: `${dayGan}(${info.meridian1}) + ${partnerGan}(${info.meridian2}) → 合化${info.huaWuxing}`
    };
}

/**
 * 获取某个日期所有时辰的完整穴位信息
 */
function getAllHourAcupointInfo(date) {
    const result = [];

    for (let h = 0; h < 24; h += 2) {
        const calcHour = (h === 0) ? 23 : h - 1;
        const tempDate = new Date(date);
        if (h === 0) {
            tempDate.setHours(23, 0, 0, 0);
        } else {
            tempDate.setHours(calcHour, 0, 0, 0);
        }

        const hgz = getHourGanZhi(tempDate, calcHour);
        const shiChenIdx = hgz.zhiIdx;

        const linggui = getLingGuiBaFa(date, hgz);
        const najia = getZiWuLiuZhuNaJia(date, hgz);
        const nazi = getZiWuLiuZhuNaZi(shiChenIdx);

        // 时间范围
        let timeRange = '';
        switch (shiChenIdx) {
            case 0: timeRange = '23:00-01:00'; break;
            case 1: timeRange = '01:00-03:00'; break;
            case 2: timeRange = '03:00-05:00'; break;
            case 3: timeRange = '05:00-07:00'; break;
            case 4: timeRange = '07:00-09:00'; break;
            case 5: timeRange = '09:00-11:00'; break;
            case 6: timeRange = '11:00-13:00'; break;
            case 7: timeRange = '13:00-15:00'; break;
            case 8: timeRange = '15:00-17:00'; break;
            case 9: timeRange = '17:00-19:00'; break;
            case 10: timeRange = '19:00-21:00'; break;
            case 11: timeRange = '21:00-23:00'; break;
        }

        // 时干属性
        const shiGanWX = getGanWuXing(hgz.ganIdx);

        result.push({
            shiChenIdx: shiChenIdx,
            shiChenName: SHI_CHEN[shiChenIdx].name,
            timeRange: timeRange,
            ganzhi: hgz.ganzhi,
            shiGan: hgz.gan,
            shiZhi: hgz.zhi,
            shiGanYinYang: shiGanWX.yinYang,
            shiGanWuXing: shiGanWX.wuXing,
            shiZhiWuXing: getZhiWuXing(hgz.zhiIdx).wuXing,
            meridian: SHI_CHEN[shiChenIdx].meridian,
            meridianCN: SHI_CHEN[shiChenIdx].meridianCN,
            linggui: linggui,
            najia: najia,
            nazi: nazi,
            wuXingGan: getGanWuXing(hgz.ganIdx),
            wuXingZhi: getZhiWuXing(hgz.zhiIdx)
        });
    }

    return result;
}

</script>
<script>
/**
 * app.js - UI渲染与交互
 */

let currentYear, currentMonth;

document.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    loadTheme();
    renderCalendar();
    renderSidebar();
    setupKeyboard();
});

// =================== 主题 ===================
function loadTheme() {
    const t = localStorage.getItem('tcm-calendar-theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
}

function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? '' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('tcm-calendar-theme', next);
}

// =================== 键盘 ===================
function setupKeyboard() {
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
        if (e.key === 'ArrowLeft' && !document.getElementById('modal-overlay').classList.contains('show')) navigateMonth(-1);
        if (e.key === 'ArrowRight' && !document.getElementById('modal-overlay').classList.contains('show')) navigateMonth(1);
        if (e.ctrlKey && e.key === 't') { e.preventDefault(); goToToday(); }
    });
}

// =================== 导航 ===================
function goToToday() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    renderCalendar();
    renderSidebar();
}

function navigateMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
    renderSidebar();
}

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    sb.classList.toggle('open');
    let ol = document.querySelector('.sidebar-overlay');
    if (!ol) {
        ol = document.createElement('div');
        ol.className = 'sidebar-overlay';
        ol.onclick = toggleSidebar;
        document.body.appendChild(ol);
    }
    ol.classList.toggle('show');
}

// =================== 侧边栏 ===================
function renderSidebar() {
    renderTodaySummary(new Date());
    renderWuYunSummary(new Date());
}

function renderTodaySummary(date) {
    const el = document.getElementById('today-summary');
    if (!el) return;
    const dGZ = getDayGanZhi(date);
    const mGZ = getMonthGanZhi(date);
    const yGZ = getYearGanZhi(date);
    const hGZ = getHourGanZhi(date, date.getHours());
    const termInfo = getCurrentSolarTerm(date);
    const naYin = getNaYin(dGZ.sexagenaryNum);
    const dWx = getGanWuXing(dGZ.ganIdx);
    const zWx = getZhiWuXing(dGZ.zhiIdx);
    const yWx = getGanWuXing(yGZ.ganIdx);
    const mWx = getGanWuXing(mGZ.ganIdx);
    const hWx = getGanWuXing(hGZ.ganIdx);

    const curTerm = termInfo.current;
    const nextTerm = termInfo.next;

    el.innerHTML = `
        <div class="info-item"><span class="label">公历:</span> ${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日 星期${['日','一','二','三','四','五','六'][date.getDay()]}</div>
        <div class="info-item"><span class="label">年干支:</span> ${yGZ.ganzhi}年 <span class="tag ${getWuXingColor(yWx.wuXingIdx)}">${yWx.wuXing}</span> ${getNaYin(yGZ.sexagenaryNum)}</div>
        <div class="info-item"><span class="label">月干支:</span> ${mGZ.ganzhi}月 <span class="tag ${getWuXingColor(mWx.wuXingIdx)}">${mWx.wuXing}</span></div>
        <div class="info-item"><span class="label">日干支:</span> ${dGZ.ganzhi}日 <span class="tag ${getWuXingColor(dWx.wuXingIdx)}">${dWx.wuXing}</span> <span class="${dWx.yinYang==='阳'?'yang-badge':'yin-badge'}">${dWx.yinYang}</span></div>
        <div class="info-item"><span class="label">时干支:</span> ${hGZ.ganzhi}时 <span class="${hWx.yinYang==='阳'?'yang-badge':'yin-badge'}">${hWx.yinYang}${hWx.wuXing}</span> (${hGZ.shiChen.name})</div>
        <div class="info-item"><span class="label">纳音:</span> ${naYin}</div>
        ${curTerm ? `<div class="info-item"><span class="label">当前节气:</span> ${curTerm.name} (${curTerm.type})</div>` : ''}
        ${nextTerm ? `<div class="info-item"><span class="label">下一节气:</span> ${nextTerm.name} ${nextTerm.date.getMonth()+1}/${nextTerm.date.getDate()}</div>` : ''}
        ${getWuMenShiBian(date) ? `<div class="info-item"><span class="label">五门十变:</span> <span style="font-size:0.8em;">${getWuMenShiBian(date).formula}</span> → 合化${getWuMenShiBian(date).huaWuxing}</div>` : ''}
    `;
}

function renderWuYunSummary(date) {
    const el = document.getElementById('wuyun-summary');
    if (!el) return;
    const wy = getWuYunLiuQiForDate(date);
    const ym = wy.yearMovement;
    const gq = wy.guestQi;
    el.innerHTML = `
        <div class="info-item"><span class="label">岁运:</span> ${ym.wuXing}运${ym.excess}</div>
        <div class="info-item"><span class="label">司天:</span> ${gq.siTian}</div>
        <div class="info-item"><span class="label">在泉:</span> ${gq.zaiQuan}</div>
        <div class="info-item"><span class="label">主运:</span> ${wy.currentHostMove.name} ${wy.currentHostMove.wuXing}</div>
        <div class="info-item"><span class="label">客运:</span> ${wy.currentGuestMove.name} ${wy.currentGuestMove.wuXing}</div>
        <div class="info-item"><span class="label">主气:</span> ${wy.currentHostQ.qi}</div>
        <div class="info-item"><span class="label">客气:</span> ${wy.currentGuestQ.qi}${wy.currentGuestQ.isSiTian?' (司天)':''}${wy.currentGuestQ.isZaiQuan?' (在泉)':''}</div>
    `;
}

// =================== 日历渲染 ===================
function renderCalendar() {
    document.getElementById('current-month-title').textContent =
        `${currentYear}年 ${currentMonth + 1}月`;

    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';

    const firstDay = new Date(currentYear, currentMonth, 1);
    const startDow = firstDay.getDay();
    const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prevLast = new Date(currentYear, currentMonth, 0).getDate();

    // 上月
    for (let i = startDow - 1; i >= 0; i--) {
        grid.innerHTML += buildDayCell(new Date(currentYear, currentMonth - 1, prevLast - i), true);
    }
    // 本月
    for (let d = 1; d <= totalDays; d++) {
        grid.innerHTML += buildDayCell(new Date(currentYear, currentMonth, d), false);
    }
    // 下月
    const remain = 42 - (startDow + totalDays);
    for (let i = 1; i <= remain; i++) {
        grid.innerHTML += buildDayCell(new Date(currentYear, currentMonth + 1, i), true);
    }
}

function buildDayCell(date, isOther) {
    const dGZ = getDayGanZhi(date);
    const dWx = getGanWuXing(dGZ.ganIdx);
    const dow = date.getDay();
    const isWeekend = dow === 0 || dow === 6;
    const dayNum = date.getDate();

    // 是否今天
    const now = new Date(); now.setHours(0,0,0,0);
    const dOnly = new Date(date); dOnly.setHours(0,0,0,0);
    const isToday = dOnly.getTime() === now.getTime();

    // 节气
    const term = getSolarTermOnDate(date);
    let termHtml = '';
    if (term) {
        const tClass = term.type === '节' ? 'jieqi' : 'solar-term';
        termHtml = `<span class="tag ${tClass}">${term.name}${term.type}</span>`;
    }

    const cls = [
        'day-cell',
        isOther ? 'other-month' : '',
        isToday ? 'today' : '',
        isWeekend && !isOther ? 'weekend' : ''
    ].filter(Boolean).join(' ');

    const wxc = getWuXingColor(dWx.wuXingIdx);
    const dateKey = `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;

    return `
    <div class="${cls}" onclick="openDayDetail('${dateKey}')" title="${dGZ.ganzhi}日">
        <span class="wuxing-indicator" style="background: var(--${wxc})"></span>
        <span class="solar-date">${dayNum}</span>
        <span class="ganzhi">${dGZ.ganzhi}</span>
        <div class="tag-row">
            <span class="tag ${wxc}">${dWx.wuXing}${dWx.yinYang}</span>
            ${termHtml}
        </div>
    </div>`;
}

// =================== 弹窗 ===================
function openDayDetail(dateKey) {
    const [y, m, d] = dateKey.split('-').map(Number);
    const date = new Date(y, m, d);

    const dayGZ = getDayGanZhi(date);
    const monthGZ = getMonthGanZhi(date);
    const yearGZ = getYearGanZhi(date);
    const dWx = getGanWuXing(dayGZ.ganIdx);
    const zWx = getZhiWuXing(dayGZ.zhiIdx);
    const mWx = getGanWuXing(monthGZ.ganIdx);
    const yWx = getGanWuXing(yearGZ.ganIdx);

    const naYinDay = getNaYin(dayGZ.sexagenaryNum);
    const naYinYear = getNaYin(yearGZ.sexagenaryNum);
    const wy = getWuYunLiuQiForDate(date);
    const allHours = getAllHourAcupointInfo(date);
    const wumen = getWuMenShiBian(date);
    const term = getSolarTermOnDate(date);
    const termInfo = getCurrentSolarTerm(date);

    // 当前时辰
    const now = new Date();
    const curHour = now.getHours();
    let curShiChenIdx = 0;
    if (curHour >= 23 || curHour < 1) curShiChenIdx = 0;
    else if (curHour >= 1 && curHour < 3) curShiChenIdx = 1;
    else curShiChenIdx = Math.floor((curHour + 1) / 2);
    const isTodayCheck = y === now.getFullYear() && m === now.getMonth() && d === now.getDate();

    const weekDays = ['日','一','二','三','四','五','六'];

    document.getElementById('modal-title').textContent =
        `${y}年${m+1}月${d}日 星期${weekDays[date.getDay()]} ${dayGZ.ganzhi}日`;

    let html = '';

    // ---- 干支信息 ----
    html += `<div class="detail-section">
        <h3>📌 干支信息</h3>
        <div class="detail-grid">
            <div class="detail-card">
                <div class="card-label">年干支 / 纳音</div>
                <div class="card-value">${yearGZ.ganzhi} <span class="tag ${getWuXingColor(yWx.wuXingIdx)}">${yWx.wuXing}</span></div>
                <div style="font-size:0.7em;color:var(--text-light);margin-top:4px;">${naYinYear}</div>
            </div>
            <div class="detail-card">
                <div class="card-label">月干支</div>
                <div class="card-value">${monthGZ.ganzhi} <span class="tag ${getWuXingColor(mWx.wuXingIdx)}">${mWx.wuXing}</span></div>
                <div style="font-size:0.7em;color:var(--text-light);margin-top:4px;">节气月第${monthGZ.lunarMonth}月</div>
            </div>
            <div class="detail-card">
                <div class="card-label">日干支 / 纳音</div>
                <div class="card-value">${dayGZ.ganzhi} <span class="tag ${getWuXingColor(dWx.wuXingIdx)}">${dWx.wuXing}</span></div>
                <div style="font-size:0.7em;color:var(--text-light);margin-top:4px;">${naYinDay} | 六十甲子第${dayGZ.sexagenaryNum+1}位</div>
            </div>
            <div class="detail-card">
                <div class="card-label">阴阳五行</div>
                <div class="card-value">
                    日干: <span class="${dWx.yinYang==='阳'?'yang-badge':'yin-badge'}">${dWx.yinYang}${dWx.wuXing}</span>
                    日支: <span class="${zWx.yinYang==='阳'?'yang-badge':'yin-badge'}">${zWx.yinYang}${zWx.wuXing}</span>
                </div>
            </div>
        </div>
    </div>`;

    // ---- 节气 ----
    if (term || termInfo.current) {
        const ct = term || termInfo.current;
        html += `<div class="detail-section">
            <h3>🌤 节气</h3>
            <div class="detail-grid">
                <div class="detail-card" style="grid-column:1/-1;">
                    <div class="card-value">
                        ${ct.name} (${ct.type || ''})
                        ${termInfo.next ? ` → 下一节气: ${termInfo.next.name} (${termInfo.next.date.getMonth()+1}/${termInfo.next.date.getDate()})` : ''}
                    </div>
                </div>
            </div>
        </div>`;
    }

    // ---- 五运六气 ----
    html += `<div class="detail-section">
        <h3>🌿 五运六气</h3>
        <div class="detail-grid">
            <div class="detail-card"><div class="card-label">岁运</div><div class="card-value">${wy.yearMovement.wuXing}运${wy.yearMovement.excess}</div></div>
            <div class="detail-card"><div class="card-label">当前主运</div><div class="card-value">${wy.currentHostMove.name}·${wy.currentHostMove.wuXing}</div></div>
            <div class="detail-card"><div class="card-label">当前客运</div><div class="card-value">${wy.currentGuestMove.name}·${wy.currentGuestMove.wuXing}</div></div>
            <div class="detail-card"><div class="card-label">当前主气</div><div class="card-value">${wy.currentHostQ.qi}</div></div>
            <div class="detail-card"><div class="card-label">当前客气</div><div class="card-value">${wy.currentGuestQ.qi}${wy.currentGuestQ.isSiTian?'(司天)':''}${wy.currentGuestQ.isZaiQuan?'(在泉)':''}</div></div>
            <div class="detail-card"><div class="card-label">司天/在泉</div><div class="card-value" style="font-size:0.9em;">${wy.guestQi.siTian}/${wy.guestQi.zaiQuan}</div></div>
        </div>
    </div>`;

    // ---- 五门十变 ----
    if (wumen) {
        html += `<div class="detail-section wumen-section">
            <h3>⚫ 五门十变</h3>
            <div style="padding:14px;text-align:center;">
                <div style="font-size:1.15em;font-weight:700;color:#2c3e50;margin-bottom:6px;">${wumen.formula}</div>
                <div style="font-size:1.05em;margin-bottom:4px;">合化 <span class="wx-highlight wx-${wumen.huaWuxing}">${wumen.huaWuxing}</span></div>
                <div style="color:#666;font-size:0.85em;">${wumen.description}</div>
            </div>
        </div>`;
    }

    // ---- 时辰开穴详情表 ----
    html += `<div class="detail-section">
        <h3>⏰ 时辰开穴 · 灵龟八法 & 子午流注
            ${isTodayCheck ? `<span class="current-badge">当前：${SHI_CHEN[curShiChenIdx].name} (${SHI_CHEN[curShiChenIdx].start}:00-${SHI_CHEN[curShiChenIdx].end}:00)</span>` : ''}
        </h3>
        <div style="font-size:0.7em;color:var(--text-light);margin-bottom:8px;">灵龟八法含配穴及卦性，纳子法含主配穴与补泻，纳甲法含合日互用穴</div>
        <div class="hour-table-wrapper">
        <table class="hour-table">
            <thead><tr>
                <th>时辰</th><th>时间</th><th>时干支</th><th>时干属性</th><th>当令经络</th>
                <th>灵龟八法(开穴/配穴/卦)</th><th>纳甲法(开穴/互用)</th><th>纳子法(主/配)</th>
            </tr></thead><tbody>`;

    allHours.forEach(h => {
        const isCur = isTodayCheck && h.shiChenIdx === curShiChenIdx;
        const trCls = isCur ? 'hour-current' : '';
        const lg = h.linggui;
        const fi = lg.fullInfo;

        // 灵龟八法格
        let lgHtml = '-';
        if (lg.acupoint) {
            lgHtml = `<b>${lg.acupoint.code}</b> ${lg.acupoint.name}
                <span title="${fi ? fi.trigramName : ''}" style="font-size:1.2em;margin-left:2px;">${fi ? fi.trigramSymbol : ''}</span>
                <br><small style="color:#888;">通${lg.acupoint.vessel}</small>`;
            if (lg.couple) {
                lgHtml += `<br><small style="color:#c4953a;">配: ${lg.couple.name}(${lg.couple.code}) ${lg.couple.trigramSymbol}</small>`;
            }
        }

        // 纳甲法格
        let njHtml = '-';
        if (h.najia.mainPoint) {
            njHtml = `<b>${h.najia.mainPoint.code}</b> ${h.najia.mainPoint.name}
                <br><small>${h.najia.mainPoint.pointType}</small>`;
        }
        if (h.najia.huyongPoint) {
            const color = h.najia.hasHuyong ? '#e67e22' : '#888';
            const label = h.najia.hasHuyong ? '互用穴:' : '合用:';
            njHtml += `<br><small style="color:${color};">${label} ${h.najia.huyongPoint.code} ${h.najia.huyongPoint.name}</small>`;
        }

        // 纳子法格
        let nzHtml = '-';
        if (h.nazi) {
            nzHtml = `<b>主:</b>${h.nazi.mainPoint.code} ${h.nazi.mainPoint.name}
                <br><small style="color:#666;">配:</small>${h.nazi.accompanyPoint.code} ${h.nazi.accompanyPoint.name}`;
        }

        html += `<tr class="${trCls}">
            <td><strong>${h.shiChenName}</strong></td>
            <td>${h.timeRange}</td>
            <td style="font-weight:600;">${h.ganzhi}<br><small style="color:#666;font-weight:400;">${h.shiGan}${h.shiGanYinYang}${h.shiGanWuXing}·${h.shiZhi}${h.shiZhiWuXing}</small></td>
            <td style="color:${getWuXingColor(h.shiGanWuXing)};font-weight:600;">${h.shiGanWuXing}(${h.shiGanYinYang})</td>
            <td class="meridian-name">${h.meridianCN}<br><small>${h.meridian}</small></td>
            <td class="lg-cell">${lgHtml}</td>
            <td class="najia-cell" style="font-size:0.78em;">${njHtml}</td>
            <td class="nazi-cell" style="font-size:0.78em;">${nzHtml}</td>
        </tr>`;
    });

    html += `</tbody></table></div></div>`;

    // ---- 灵龟八法配穴总表 ----
    html += `<div class="detail-section">
        <h3>🐢 灵龟八法 · 八脉交会穴配伍</h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:12px;padding:14px;">`;
    LINGGUI_COUPLES.forEach(cp => {
        const a = LINGGUI_ACUPOINTS[cp.a];
        const b = LINGGUI_ACUPOINTS[cp.b];
        const fiA = LINGGUI_FULL_INFO[cp.a];
        const fiB = LINGGUI_FULL_INFO[cp.b];
        html += `<div class="trigram-pair-card">
            <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px;">
                <span style="font-weight:700;">${cp.a}.${a.name} <small style="color:#888;">(${fiA.trigramSymbol}${fiA.trigram})</small></span>
                <span style="font-size:1.3em;color:#bbb;">↔</span>
                <span style="font-weight:700;">${cp.b}.${b.name} <small style="color:#888;">(${fiB.trigramSymbol}${fiB.trigram})</small></span>
            </div>
            <div style="font-size:0.85em;color:#555;">${cp.vesselA} ↔ ${cp.vesselB}</div>
            <div style="font-size:0.78em;color:#999;">${cp.relation}</div>
        </div>`;
    });
    html += `</div></div>`;

    // ---- 纳子法补泻详表 ----
    html += `<div class="detail-section">
        <h3>💉 纳子法 · 十二经主配穴与补泻</h3>
        <div style="overflow-x:auto;">
        <table class="hour-table">
            <thead><tr>
                <th>时辰</th><th>经络</th><th>主穴(输穴)</th><th>配穴(表里)</th><th>补法(母穴)</th><th>泻法(子穴)</th>
            </tr></thead><tbody>`;
    allHours.forEach(h => {
        const nz = h.nazi;
        if (!nz) return;
        const isCur = isTodayCheck && h.shiChenIdx === curShiChenIdx;
        html += `<tr class="${isCur ? 'hour-current' : ''}">
            <td>${h.shiChenName}</td><td>${nz.meridian}</td>
            <td class="acupoint-highlight">${nz.mainPoint.name}(${nz.mainPoint.code})</td>
            <td>${nz.accompanyPoint.name}(${nz.accompanyPoint.code})<br><small style="color:#888;">${nz.accompanyPoint.reason.replace(/([（(]).*?([)）])/g,'')}</small></td>
            <td style="color:#27ae60;">${nz.supplementPoint.name}(${nz.supplementPoint.code})<br><small>${nz.supplementPoint.reason}</small></td>
            <td style="color:#e74c3c;">${nz.drainPoint.name}(${nz.drainPoint.code})<br><small>${nz.drainPoint.reason}</small></td>
        </tr>`;
    });
    html += `</tbody></table></div></div>`;

    // ---- 五输穴五行 ----
    html += `<div class="detail-section">
        <h3>🖐 五输穴五行属性</h3>
        <div style="font-size:0.78em;padding:10px 14px;color:#888;">阴经：井木→荥火→输土→经金→合水 | 阳经：井金→荥水→输木→经火→合土</div>
        <div style="padding:0 14px 14px;">`;
    allHours.forEach(h => {
        const nz = h.nazi;
        if (!nz) return;
        html += `<div class="wushu-row">
            <div style="font-weight:700;color:#2c3e50;margin-bottom:4px;">${h.shiChenName} ${nz.meridian}</div>
            <div class="wushu-pills">
                <span>井<em class="wx-mini wx-${nz.well.wuXing}">${nz.well.wuXing}</em>${nz.well.name}</span>
                <span>荥<em class="wx-mini wx-${nz.spring.wuXing}">${nz.spring.wuXing}</em>${nz.spring.name}</span>
                <span>输<em class="wx-mini wx-${nz.stream.wuXing}">${nz.stream.wuXing}</em>${nz.stream.name}</span>
                <span>经<em class="wx-mini wx-${nz.river.wuXing}">${nz.river.wuXing}</em>${nz.river.name}</span>
                <span>合<em class="wx-mini wx-${nz.sea.wuXing}">${nz.sea.wuXing}</em>${nz.sea.name}</span>
            </div>
        </div>`;
    });
    html += `</div></div>`;

    // ---- 纳甲法合日互用说明 ----
    html += `<div class="detail-section">
        <h3>🔄 纳甲法 · 合日互用穴</h3>
        <div style="padding:14px;font-size:0.85em;">
            <p style="margin-bottom:8px;">${NAJIA_HUYONG_INFO[dayGZ.gan] || '天干合化原理'}</p>
            <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;">
                <span class="he-gan-item">甲⇌己(土)</span>
                <span class="he-gan-item">乙⇌庚(金)</span>
                <span class="he-gan-item">丙⇌辛(水)</span>
                <span class="he-gan-item">丁⇌壬(木)</span>
                <span class="he-gan-item">戊⇌癸(火)</span>
            </div>
            <p style="margin-top:8px;font-size:0.8em;color:#888;">当本日日干不开某时辰穴位时，可取合日对应时辰的穴位（互用穴表中以<span style="color:#e67e22;">橙色</span>标注）</p>
        </div>
    </div>`;

    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('show');
    document.body.style.overflow = 'hidden';

    // 滚动到当前时辰
    requestAnimationFrame(() => {
        const curRow = document.querySelector('.hour-current');
        if (curRow) curRow.scrollIntoView({ block: 'center', behavior: 'smooth' });
    });
}

function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
    document.body.style.overflow = '';
}

</script>
</body>
</html>
