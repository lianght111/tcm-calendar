    <title>传统中医日历</title>
    <style>
/* ===== 基础样式与变量 ===== */
:root {
    --bg-primary: #f8f5f0;
    --bg-secondary: #fffef9;
    --bg-card: #ffffff;
    --bg-sidebar: #2c2416;
    --text-primary: #3d3226;
    --text-secondary: #6b5e4a;
    --text-sidebar: #e8dcc8;
    --text-light: #9b8c7a;
    --border-color: #e0d5c1;
    --accent: #c4953a;
    --accent-light: #e8c97a;
    --wood: #5a9e4b;
    --fire: #c0392b;
    --earth: #d49532;
    --metal: #b8a05e;
    --water: #2c5f8a;
    --yin-bg: #e8f0fe;
    --yang-bg: #fff3e0;
    --solar-term: #27ae60;
    --today-bg: #fff8e1;
    --today-border: #c4953a;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.15);
    --radius: 10px;
    --radius-sm: 6px;
    --transition: all 0.3s ease;
}

[data-theme="dark"] {
    --bg-primary: #1a1814;
    --bg-secondary: #221f18;
    --bg-card: #2a261e;
    --bg-sidebar: #14120e;
    --text-primary: #e8dcc8;
    --text-secondary: #b8a88a;
    --text-sidebar: #c8b898;
    --text-light: #8a7a60;
    --border-color: #3a3226;
    --accent: #d4a84b;
    --accent-light: #c89838;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.5);
    --yin-bg: #1a2740;
    --yang-bg: #3a2010;
    --today-bg: #2a2418;
    --today-border: #d4a84b;
}

/* ===== 全局样式 ===== */
*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Hiragino Sans GB", sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: var(--transition);
}

.app-container {
    display: flex;
    min-height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
}

/* ===== 侧边栏 ===== */
.sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--bg-sidebar);
    color: var(--text-sidebar);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    transition: var(--transition);
    z-index: 100;
}

.sidebar-header h2 {
    font-size: 1.4em;
    margin-bottom: 4px;
    color: var(--accent-light);
}

.sidebar-header .subtitle {
    font-size: 0.85em;
    opacity: 0.7;
}

.sidebar-section h3 {
    font-size: 0.9em;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    color: var(--accent-light);
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 6px;
}

.sidebar-section .info-item {
    font-size: 0.82em;
    line-height: 1.7;
    opacity: 0.85;
}

.sidebar-section .info-item .label {
    color: var(--accent-light);
    margin-right: 4px;
}

.btn-sidebar {
    display: block;
    width: 100%;
    padding: 10px 16px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-sidebar);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.85em;
    transition: var(--transition);
    text-align: left;
}

.btn-sidebar:hover {
    background: rgba(255,255,255,0.15);
    border-color: var(--accent-light);
}

/* ===== 主内容 ===== */
.main-content {
    flex: 1;
    padding: 16px 24px;
    overflow-y: auto;
    transition: var(--transition);
}

/* ===== 顶部导航 ===== */
.calendar-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}

.calendar-header h1 {
    font-size: 1.5em;
    font-weight: 600;
    min-width: 200px;
    text-align: center;
    color: var(--text-primary);
}

.nav-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--border-color);
    background: var(--bg-card);
    cursor: pointer;
    font-size: 1.1em;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-primary);
    transition: var(--transition);
    box-shadow: var(--shadow);
}

.nav-btn:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}

#menu-toggle {
    position: absolute;
    left: 16px;
}

/* ===== 图例 ===== */
.legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 12px;
    padding: 10px 16px;
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    font-size: 0.78em;
    justify-content: center;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--text-secondary);
}

.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
}

.solar-term-dot { background: var(--solar-term); }
.jieqi-dot { background: var(--accent); }
.wuxing-dot.wood { background: var(--wood); }
.wuxing-dot.fire { background: var(--fire); }
.wuxing-dot.earth { background: var(--earth); }
.wuxing-dot.metal { background: var(--metal); }
.wuxing-dot.water { background: var(--water); }

/* ===== 星期标题 ===== */
.weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 2px;
}

.weekday {
    text-align: center;
    padding: 10px 4px;
    font-weight: 600;
    font-size: 0.85em;
    color: var(--text-secondary);
    background: var(--bg-card);
    border-radius: var(--radius-sm);
}

.weekday:first-child { color: #c0392b; }
.weekday:last-child { color: #c0392b; }

/* ===== 日历网格 ===== */
.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
}

.day-cell {
    aspect-ratio: 1;
    min-height: 90px;
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    padding: 6px;
    cursor: pointer;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 2px solid transparent;
}

.day-cell:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
    z-index: 10;
    border-color: var(--accent-light);
}

.day-cell.other-month {
    opacity: 0.35;
    background: var(--bg-secondary);
}

.day-cell.today {
    border-color: var(--today-border) !important;
    background: var(--today-bg);
    box-shadow: 0 0 0 2px var(--today-border);
    z-index: 5;
}

.day-cell.weekend {
    background: #fef5f5;
}

[data-theme="dark"] .day-cell.weekend {
    background: #2a1a1a;
}

.day-cell .solar-date {
    font-size: 1.1em;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
}

.day-cell.today .solar-date {
    color: var(--accent);
}

.day-cell .ganzhi {
    font-size: 0.7em;
    color: var(--text-secondary);
    margin-top: 2px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.day-cell .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin-top: auto;
}
.current-shichen-tag { background: #28a745; color: #fff; font-weight: 700; font-size: 0.6em; animation: pulse 2s infinite; }
@keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.7; }
}

.day-cell .tag {
    font-size: 0.58em;
    padding: 1px 4px;
    border-radius: 3px;
    white-space: nowrap;
    line-height: 1.4;
    font-weight: 600;
}

.tag.solar-term { background: #d5f5e3; color: #1a7a3a; }
.tag.jieqi { background: #fdebd0; color: #b7770b; }
.tag.wood { background: #d5f5e3; color: #1a7a3a; }
.tag.fire { background: #fadbd8; color: #922b21; }
.tag.earth { background: #fdebd0; color: #b7770b; }
.tag.metal { background: #fef9e7; color: #7d6608; }
.tag.water { background: #d4e6f1; color: #1b4f72; }

[data-theme="dark"] .tag.solar-term { background: #1a3a1a; color: #5ab07a; }
[data-theme="dark"] .tag.jieqi { background: #3a2a10; color: #d4a048; }
[data-theme="dark"] .tag.wood { background: #1a3a1a; color: #5ab07a; }
[data-theme="dark"] .tag.fire { background: #3a1a1a; color: #e07060; }
[data-theme="dark"] .tag.earth { background: #3a2a10; color: #d4a048; }
[data-theme="dark"] .tag.metal { background: #3a3a10; color: #c8b040; }
[data-theme="dark"] .tag.water { background: #1a2a3a; color: #5a90c0; }

.day-cell .wuxing-indicator {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
}

/* ===== 弹窗 ===== */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(4px);
}

.modal-overlay.show { display: flex; }

.modal {
    background: var(--bg-card);
    border-radius: var(--radius);
    width: 92%;
    max-width: 1300px;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.3s ease;
}

@keyframes modalIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border-color);
    position: sticky;
    top: 0;
    background: var(--bg-card);
    z-index: 10;
    border-radius: var(--radius) var(--radius) 0 0;
}

.modal-header h2 { font-size: 1.2em; color: var(--text-primary); }

.close-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--bg-secondary);
    cursor: pointer;
    font-size: 1.1em;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
}

.close-btn:hover { background: #e74c3c; color: white; }
.modal-body { padding: 20px 24px; }

/* ===== 详情面板 ===== */
.detail-section { margin-bottom: 20px; }
.detail-section h3 {
    font-size: 1em;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--accent-light);
    color: var(--accent);
}

.detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
}

.detail-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
    padding: 12px;
    border: 1px solid var(--border-color);
}

.detail-card .card-label {
    font-size: 0.7em;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
}

.detail-card .card-value {
    font-size: 1.1em;
    font-weight: 600;
    color: var(--text-primary);
}

.yin-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; background: var(--yin-bg); color: #2c5f8a; font-size: 0.75em; font-weight: 600; }
.yang-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; background: var(--yang-bg); color: #c0392b; font-size: 0.75em; font-weight: 600; }

/* ===== 时辰表 ===== */
.hour-table-wrapper { overflow-x: auto; max-height: 600px; overflow-y: auto; border-radius: 8px; border: 1px solid #dee2e6; }
.hour-table { width: 100%; border-collapse: collapse; font-size: 0.8em; table-layout: fixed; }
.hour-table thead th {
    background: #2c3e50; color: #ecf0f1; padding: 10px 6px; text-align: center;
    font-weight: 600; position: sticky; top: 0; z-index: 1;
}
.hour-table tbody td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #e0e0e0; vertical-align: middle; }
/* 固定各列宽度，防止错列 */
.hour-table th:nth-child(1), .hour-table td:nth-child(1) { width: 4%; }
.hour-table th:nth-child(2), .hour-table td:nth-child(2) { width: 7%; }
.hour-table th:nth-child(3), .hour-table td:nth-child(3) { width: 9%; }
.hour-table th:nth-child(4), .hour-table td:nth-child(4) { width: 6%; }
.hour-table th:nth-child(5), .hour-table td:nth-child(5) { width: 10%; }
.hour-table th:nth-child(6), .hour-table td:nth-child(6) { width: 22%; }
.hour-table th:nth-child(7), .hour-table td:nth-child(7) { width: 22%; }
.hour-table th:nth-child(8), .hour-table td:nth-child(8) { width: 20%; }

.hour-current { background: rgba(76, 175, 80, 0.25) !important; border-left: 4px solid #4caf50 !important; box-shadow: inset 0 0 20px rgba(76, 175, 80, 0.1); }
.hour-current td { font-weight: 600; }

.acupoint-code { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 1px 5px; border-radius: 3px; font-weight: 700; font-size: 0.85em; margin: 1px; }
.acupoint-highlight { color: #c4953a; font-weight: 600; }
.meridian-name { color: #2c5f8a; }

.detail-header { display: flex; gap: 20px; flex-wrap: wrap; padding: 16px; background: linear-gradient(135deg, rgba(52,152,219,0.08), rgba(155,89,182,0.08)); border-radius: 10px; margin-bottom: 16px; }
.dh-item { display: flex; flex-direction: column; gap: 4px; }
.dh-label { font-size: 0.75em; color: #888; text-transform: uppercase; letter-spacing: 1px; }
.dh-value { font-size: 1.1em; font-weight: 600; }
.dh-sub { font-size: 0.8em; color: #999; }

.current-badge { background: #4caf50; color: #fff; padding: 3px 10px; border-radius: 12px; font-size: 0.82em; font-weight: 600; animation: pulse-current 2s ease-in-out infinite; }
@keyframes pulse-current { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

/* 五门十变 */
.wumen-section .section-content { background: linear-gradient(135deg, rgba(231,76,60,0.05), rgba(46,204,113,0.05)); }
.wx-highlight { display: inline-block; padding: 3px 12px; border-radius: 14px; color: #fff; font-weight: 700; margin: 0 4px; }
.wx-木 { background: #27ae60; color: #fff; } .wx-火 { background: #e74c3c; color: #fff; }
.wx-土 { background: #f39c12; color: #fff; } .wx-金 { background: #b8860b; color: #fff; }
.wx-水 { background: #2980b9; color: #fff; }

.he-gan-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; justify-content: center; }
.he-gan-item { background: #f0f4f8; border: 1px solid #dce4ec; padding: 6px 14px; border-radius: 20px; font-size: 0.85em; font-weight: 600; color: #2c3e50; }

/* 灵龟八法配穴卡片 */
.trigram-pairs { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; padding: 14px; }
.trigram-pair-card { background: linear-gradient(135deg, #fafafa, #f0f0f0); border: 1px solid #e0e0e0; border-radius: 10px; padding: 14px; text-align: center; transition: all 0.2s; }
.trigram-pair-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

/* 五输穴 */
.wushu-row { margin-bottom: 8px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
.wushu-pills { display: flex; flex-wrap: wrap; gap: 6px; font-size: 0.8em; }
.wushu-pills span { background: #fff; padding: 3px 8px; border-radius: 6px; border: 1px solid #e8e8e8; }
.wx-mini { font-style: normal; font-weight: 700; font-size: 0.8em; padding: 1px 4px; border-radius: 6px; margin: 0 2px; }
.wx-mini.wx-木 { background: #27ae60; color: #fff; } .wx-mini.wx-火 { background: #e74c3c; color: #fff; }
.wx-mini.wx-土 { background: #f39c12; color: #fff; } .wx-mini.wx-金 { background: #b8860b; color: #fff; }
.wx-mini.wx-水 { background: #2980b9; color: #fff; }

#menu-toggle { display: none; }

/* ===== 响应式 ===== */
@media (max-width: 900px) {
    #menu-toggle { display: flex !important; }
    .sidebar { position: fixed; left: -300px; top: 0; height: 100%; width: 280px; box-shadow: var(--shadow-lg); transition: left 0.3s ease; }
    .sidebar.open { left: 0; }
    .main-content { padding: 12px; }
    .calendar-header { gap: 6px; }
    .calendar-header h1 { font-size: 1.15em; min-width: 150px; }
    .nav-btn { width: 36px; height: 36px; font-size: 0.95em; }
    .day-cell { min-height: 68px; padding: 4px; }
    .day-cell .solar-date { font-size: 0.95em; }
    .day-cell .ganzhi { font-size: 0.62em; }
    .day-cell .tag { font-size: 0.52em; }
    .modal { width: 95%; max-height: 90vh; }
    .detail-grid { grid-template-columns: repeat(2, 1fr); }
    .hour-table { font-size: 0.7em; }
    .hour-table th, .hour-table td { padding: 5px 3px; }
}

@media (max-width: 480px) {
    .day-cell { min-height: 55px; padding: 3px; }
    .day-cell .solar-date { font-size: 0.85em; }
    .day-cell .ganzhi { font-size: 0.55em; }
    .day-cell .tag { font-size: 0.48em; padding: 1px 2px; }
    .legend { font-size: 0.7em; gap: 6px; padding: 8px 10px; }
}

.sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 99; }
.sidebar-overlay.show { display: block; }

/* 时辰阴阳着色 */
.shi-yang { color: #d35400 !important; font-weight: 700; }
.shi-yin { color: #2980b9 !important; font-weight: 700; }
.shi-yang-row td { background: #fff5f0; padding: 8px 5px; }
.shi-yin-row td { background: #f0f5ff; padding: 8px 5px; }
.current-shichen { background: #d4edda !important; border-left: 3px solid #28a745; }
.current-shichen td { background: #e8f5e9 !important; font-weight: 600; }
.current-shichen td:first-child::before { content: '★ '; color: #28a745; }
/* 互用穴特殊标记 */
.huyong-mark { background: #e67e22; color: #fff; padding: 1px 4px; border-radius: 3px; font-size: 0.75em; margin-left: 4px; }
.huyong-real { border: 2px solid #e67e22; background: #fff8f0; padding: 2px 5px; border-radius: 3px; font-weight: 600; }
.huyong-common { border: 1px dashed #ccc; padding: 2px 5px; border-radius: 3px; }
/* 五输穴位标记 */
.wushu-tag { font-size: 0.7em; padding: 1px 4px; border-radius: 3px; margin-left: 2px; background: #f0f0f0; color: #666; }
/* 纳甲法单元格样式 */
.na-main { font-weight: 700; color: #2d3748; }
.na-yuan { display: block; font-size: 0.75em; color: #e67e22; font-weight: 600; }
.na-note { display: block; font-size: 0.7em; color: #888; font-style: italic; }
.na-closed { color: #aaa; font-style: italic; }
/* 纳子法配穴 */
.nz-accompany { display: block; font-size: 0.75em; color: #667eea; }
/* 灵龟八法配穴 */

function getYearGanZhi(date) {
    const year = date.getFullYear();
    const solarTerms = getSolarTermDates(year);
    const liChun = solarTerms[2];
    let effectiveYear = year;
    if(date < liChun) effectiveYear = year - 1;
    const ganIdx = (effectiveYear - 4) % 10;
    const zhiIdx = (effectiveYear - 4) % 12;
    return {
        gan: TIAN_GAN[ganIdx<0?ganIdx+10:ganIdx],
        zhi: DI_ZHI[zhiIdx<0?zhiIdx+12:zhiIdx],
        ganzhi: TIAN_GAN[ganIdx<0?ganIdx+10:ganIdx] + DI_ZHI[zhiIdx<0?zhiIdx+12:zhiIdx],
        ganIdx: ganIdx<0?ganIdx+10:ganIdx,
        zhiIdx: zhiIdx<0?zhiIdx+12:zhiIdx,
        sexagenaryNum: getSexagenaryNum(ganIdx<0?ganIdx+10:ganIdx, zhiIdx<0?zhiIdx+12:zhiIdx)
    };
}

function getMonthGanZhi(date) {
    const year = date.getFullYear();
    const solarTerms = getSolarTermDates(year);
    const prevYearTerms = getSolarTermDates(year - 1);
    const liChunThisYear = solarTerms[2];
    const xiaoHanThisYear = solarTerms[0];
    let lunarMonthIdx = 0;
    let effectiveYear = year;
    if(date >= liChunThisYear) {
        effectiveYear = year;
        const jieIndices = [22,20,18,16,14,12,10,8,6,4,2];
        const jieToMonth = {22:10,20:9,18:8,16:7,14:6,12:5,10:4,8:3,6:2,4:1,2:0};
        for(const j of jieIndices) { if(date >= solarTerms[j]) { lunarMonthIdx = jieToMonth[j]; break; } }
    } else if(date >= xiaoHanThisYear) {
        effectiveYear = year - 1;
        lunarMonthIdx = 11;
    } else {
        effectiveYear = year - 1;
        const prevDaXue = prevYearTerms[22];
        if(date >= prevDaXue) {
            lunarMonthIdx = 10;
        } else {
            const jieIndices = [20,18,16,14,12,10,8,6,4,2];
            const jieToMonth = {20:9,18:8,16:7,14:6,12:5,10:4,8:3,6:2,4:1,2:0};
            let found = false;
            for(const j of jieIndices) { if(date >= prevYearTerms[j]) { lunarMonthIdx = jieToMonth[j]; found=true; break; } }
            if(!found) lunarMonthIdx = 10;
        }
    }
    const yearGanIdx = (effectiveYear - 4) % 10;
    const adjustedYearGanIdx = yearGanIdx < 0 ? yearGanIdx + 10 : yearGanIdx;
    const huDunStart = [2,4,6,8,0];
    const groupIdx = adjustedYearGanIdx % 5;
    const monthGanIdx = (huDunStart[groupIdx] + lunarMonthIdx) % 10;
    const monthZhiIdx = (lunarMonthIdx + 2) % 12;
    return {
        gan: TIAN_GAN[monthGanIdx], zhi: DI_ZHI[monthZhiIdx],
        ganzhi: TIAN_GAN[monthGanIdx] + DI_ZHI[monthZhiIdx],
        ganIdx: monthGanIdx, zhiIdx: monthZhiIdx, lunarMonth: lunarMonthIdx + 1
    };
}

function getDayGanZhi(date) {
    const base = new Date(Date.UTC(2000, 0, 1));
    const utc = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const diffDays = Math.floor((utc - base) / 86400000);
    const cycleDay = (54 + ((diffDays % 60) + 60) % 60) % 60;
    const ganIdx = cycleDay % 10;
    const zhiIdx = cycleDay % 12;
    return {
        gan: TIAN_GAN[ganIdx], zhi: DI_ZHI[zhiIdx],
        ganzhi: TIAN_GAN[ganIdx] + DI_ZHI[zhiIdx],
        ganIdx: ganIdx, zhiIdx: zhiIdx, sexagenaryNum: cycleDay
    };
}

function getHourGanZhi(date, hour) {
    const dayGZ = getDayGanZhi(date);
    const dayGanIdx = dayGZ.ganIdx;
    let shiChenIdx = 0;
    if(hour>=23||hour<1) shiChenIdx=0;
    else if(hour>=1&&hour<3) shiChenIdx=1;
    else if(hour>=3&&hour<5) shiChenIdx=2;
    else if(hour>=5&&hour<7) shiChenIdx=3;
    else if(hour>=7&&hour<9) shiChenIdx=4;
    else if(hour>=9&&hour<11) shiChenIdx=5;
    else if(hour>=11&&hour<13) shiChenIdx=6;
    else if(hour>=13&&hour<15) shiChenIdx=7;
    else if(hour>=15&&hour<17) shiChenIdx=8;
    else if(hour>=17&&hour<19) shiChenIdx=9;
    else if(hour>=19&&hour<21) shiChenIdx=10;
    else if(hour>=21&&hour<23) shiChenIdx=11;
    const ratDunStart = [0,2,4,6,8];
    const groupIdx = dayGanIdx % 5;
    const hourGanIdx = (ratDunStart[groupIdx] + shiChenIdx) % 10;
    return {
        gan: TIAN_GAN[hourGanIdx], zhi: DI_ZHI[shiChenIdx],
        ganzhi: TIAN_GAN[hourGanIdx] + DI_ZHI[shiChenIdx],
        ganIdx: hourGanIdx, zhiIdx: shiChenIdx, shiChen: SHI_CHEN[shiChenIdx]
    };
}

function getCurrentShiChen(date) {

}

function getSunLongitude(jd) {
    const T = (jd - 2451545.0) / 36525.0;
    const T2 = T * T;
    let L0 = 280.46646 + 36000.76983 * T + 0.0003032 * T2;
    const M = 357.52911 + 35999.05029 * T - 0.0001537 * T2;
    const Mrad = M * Math.PI / 180.0;
    const C = (1.914602 - 0.004817 * T - 0.000014 * T2) * Math.sin(Mrad) + (0.019993 - 0.000101 * T) * Math.sin(2 * Mrad) + 0.000289 * Math.sin(3 * Mrad);
    let L = L0 + C;
    L = ((L % 360) + 360) % 360;
    return L;
}

function getSolarTermDates(year) {
    if(_solarTermCache[year]) return _solarTermCache[year];
    const terms = [];
    for(let i=0;i<24;i++) {
        const targetAngle = SOLAR_TERMS[i].angle;
        const baseMonth = SOLAR_TERMS[i].month;
        let estimatedDay, actualYear, month0;
        if(baseMonth===0 && i>=22) {
            const nextY = (year+1)%100;
            estimatedDay = Math.floor(nextY*0.2422+SOLAR_TERM_C[i]) - Math.floor(nextY/4);
            actualYear = year+1; month0 = 0;
        } else {
            const Y = year%100;
            estimatedDay = Math.floor(Y*0.2422+SOLAR_TERM_C[i]) - Math.floor(Y/4);
            actualYear = year; month0 = baseMonth;
        }
        let bestDate = null; let minDiff = Infinity;
        for(let d=estimatedDay-2; d<=estimatedDay+2; d++) {
            if(d<1||d>31) continue;
            const testDate = new Date(actualYear, month0, d, 12, 0, 0);
            const jd = getJulianDay(testDate);
            const actualAngle = getSunLongitude(jd);
            let diff = actualAngle - targetAngle;
            if(diff>180) diff-=360;
            if(diff<-180) diff+=360;
            if(Math.abs(diff)<Math.abs(minDiff)) { minDiff=diff; bestDate=new Date(actualYear, month0, d); }
        }
        if(bestDate && Math.abs(minDiff)>1.5) {
            const adjustDir = minDiff>0?-1:1;
            const adjustedDate = new Date(bestDate);
            adjustedDate.setDate(adjustedDate.getDate()+adjustDir);
            const jd2 = getJulianDay(adjustedDate);
            const angle2 = getSunLongitude(jd2);
            let diff2 = angle2 - targetAngle;
            if(diff2>180) diff2-=360;
            if(diff2<-180) diff2+=360;
            if(Math.abs(diff2)<Math.abs(minDiff)) { bestDate=adjustedDate; minDiff=diff2; }
        }
        terms.push(bestDate||new Date(actualYear, month0, estimatedDay));
    }
    _solarTermCache[year] = terms;
    return terms;
}

function getCurrentSolarTerm(date) {
    const year = date.getFullYear();
    const terms = getSolarTermDates(year);
    const termsNextYear = getSolarTermDates(year+1);
    const termsPrevYear = getSolarTermDates(year-1);
    const allTerms = [...termsPrevYear, ...terms, ...termsNextYear];
    let currentTerm=null;
    for(let i=allTerms.length-1; i>=0; i--) {
        if(date>=allTerms[i]) { currentTerm={...SOLAR_TERMS[i%24], date:allTerms[i], index:i%24}; break; }
    }
    let nextTerm=null;
    for(let i=0; i<allTerms.length; i++) {
        if(date<allTerms[i]) { nextTerm={...SOLAR_TERMS[i%24], date:allTerms[i], index:i%24}; break; }
    }
    return {current:currentTerm, next:nextTerm};
}

function getSolarTermOnDate(date) {
    const year = date.getFullYear();
    const terms = getSolarTermDates(year);
    const termsNextYear = getSolarTermDates(year+1);
    const checkDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    for(let i=0; i<terms.length; i++) {
        const termDate = new Date(terms[i].getFullYear(), terms[i].getMonth(), terms[i].getDate());
        if(checkDate.getTime()===termDate.getTime()) return {...SOLAR_TERMS[i], date:terms[i]};
    }
    for(let i=0; i<2; i++) {
        const termDate = new Date(termsNextYear[i].getFullYear(), termsNextYear[i].getMonth(), termsNextYear[i].getDate());
        if(checkDate.getTime()===termDate.getTime()) return {...SOLAR_TERMS[i], date:termsNextYear[i]};
    }
    return null;
}

function getJulianDay(date) {
    let y=date.getFullYear(), m=date.getMonth()+1;
    const d=date.getDate()+date.getHours()/24.0+date.getMinutes()/1440.0;
    if(m<=2) { y-=1; m+=12; }
    const A=Math.floor(y/100), B=2-A+Math.floor(A/4);
    return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524.5;
}

function getWuYunLiuQiForDate(date) {
    const year=date.getFullYear();
    const yearGZ=getYearGanZhi(date);
    const yearMovement=getYearMovement(yearGZ);

    const guestMovements=getGuestMovement(yearMovement);
    const hostQi=getHostQi();
    const guestQi=getGuestQi(yearGZ);
    const currTerms=getSolarTermDates(year);
    const daHan=currTerms[1], chunFen=currTerms[5], xiaoMan=currTerms[9];
    const daShu=currTerms[13], qiuFen=currTerms[17], xiaoXue=currTerms[21];
    const mangZhong=currTerms[10], chuShu=currTerms[15], liDong=currTerms[19];
    let currentHostMove=hostMovements[0], currentGuestMove=guestMovements[0];
    let currentHostQ=hostQi[0], currentGuestQ=guestQi.steps[0];
    if(date>=daHan&&date<chunFen) { currentHostMove=hostMovements[0]; currentGuestMove=guestMovements[0]; }
    else if(date>=chunFen&&date<mangZhong) { currentHostMove=hostMovements[1]; currentGuestMove=guestMovements[1]; }
    else if(date>=mangZhong&&date<chuShu) { currentHostMove=hostMovements[2]; currentGuestMove=guestMovements[2]; }
    else if(date>=chuShu&&date<liDong) { currentHostMove=hostMovements[3]; currentGuestMove=guestMovements[3]; }
    else { currentHostMove=hostMovements[4]; currentGuestMove=guestMovements[4]; }
    if(date>=daHan&&date<chunFen) { currentHostQ=hostQi[0]; currentGuestQ=guestQi.steps[0]; }
    else if(date>=chunFen&&date<xiaoMan) { currentHostQ=hostQi[1]; currentGuestQ=guestQi.steps[1]; }
    else if(date>=xiaoMan&&date<daShu) { currentHostQ=hostQi[2]; currentGuestQ=guestQi.steps[2]; }
    else if(date>=daShu&&date<qiuFen) { currentHostQ=hostQi[3]; currentGuestQ=guestQi.steps[3]; }
    else if(date>=qiuFen&&date<xiaoXue) { currentHostQ=hostQi[4]; currentGuestQ=guestQi.steps[4]; }
    else { currentHostQ=hostQi[5]; currentGuestQ=guestQi.steps[5]; }
    return {yearMovement,hostMovements,guestMovements,hostQi,guestQi,currentHostMove,currentGuestMove,currentHostQ,currentGuestQ};
}

const LUNAR_MONTH_NAMES = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','腊月'];
const LUNAR_DAY_NAMES = [
    '','初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
    '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
    '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'

function lunarYearDays(y) {
    let sum = 348;
    for(let i=0x8000;i>0x8;i>>=1) { sum+=(LUNAR_INFO[y]&i)?1:0; }
    return sum+leapMonthDays(y);
}
function leapMonthDays(y) { if(leapMonth(y)) return (LUNAR_INFO[y]&0x10000)?30:29; return 0; }
function leapMonth(y) { return LUNAR_INFO[y]&0xf; }
function lunarMonthDays(y, m) { return (LUNAR_INFO[y]&(0x10000>>m))?30:29; }

function getLunarDate(date) {
    const baseYear=1900;
    const baseDate=new Date(1900,0,31);
    let offset=Math.floor((date-baseDate)/86400000);
    let year=0, daysInYear;
    for(year=baseYear;year<2101&&offset>0;year++) {
        daysInYear=lunarYearDays(year-baseYear);
        offset-=daysInYear;
    }
    if(offset<0) { offset+=daysInYear; year--; }
    const lunarY=year;
    const yearIdx=year-baseYear;
    const leap=leapMonth(yearIdx);
    let isLeap=false;
    let month=0;
    for(month=1;month<=12&&offset>0;month++) {
        if(leap>0&&month===(leap+1)&&!isLeap) {
            month--;
            isLeap=true;
            const leapDays=leapMonthDays(yearIdx);
            if(offset>=leapDays) { offset-=leapDays; isLeap=false; month++; }
        } else {
            const mDays=lunarMonthDays(yearIdx,month);
            if(offset>=mDays) offset-=mDays;
            else break;
        }
    }
    const day=Math.floor(offset)+1;
    if(month>12) month=12;
    if(day<1) day=1;
    const yearGZ=getYearGanZhi(date);
    const animals=['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
    const animal=animals[yearGZ.zhiIdx];
    let monthName=LUNAR_MONTH_NAMES[month-1]||'';
    if(isLeap) monthName='闰'+monthName;
    let dayName=LUNAR_DAY_NAMES[day]||'';
    return {year:lunarY,month:month,day:day,isLeap:isLeap,monthName:monthName,dayName:dayName,yearGanZhi:yearGZ.ganzhi,yearAnimal:animal};
}

function getZiWuLiuZhuNaJia(date, shiChenGanZhi) {

    const isYangDay=[0,2,4,6,8].includes(dayGanIdx);
    const isYangHour=[0,2,4,6,8,10].includes(hourZhiIdx);
    const partnerGan=NAJIA_HE_PAIRS[dayGan];
    let huyongPoint=null;
    if(partnerGan&&point===null&&((isYangDay&&!isYangHour)||(!isYangDay&&isYangHour))) {
        const partnerPoints=ZIWU_NAJIA_POINTS[partnerGan];
        huyongPoint=partnerPoints?(partnerPoints[hourZhiIdx]||null):null;
    }
    return {mainPoint:point,huyongPoint:huyongPoint,huyongGan:partnerGan,huyongInfo:NAJIA_HUYONG_INFO[dayGan]||'',hasHuyong:point===null&&huyongPoint!==null};
}

function getZiWuLiuZhuNaZi(shiChenIdx) {
    if(shiChenIdx<0||shiChenIdx>=12) return null;
    const naziPoint=ZIWU_NAZI_POINTS[shiChenIdx];
    const pairData=NAZI_PAIR_POINTS[shiChenIdx];
    if(!naziPoint||!pairData) return null;
    const isYangMeridian=[0,3,4,7,8,11].includes(shiChenIdx);
    const wellWX=getShuPointWuxing(shiChenIdx,'well');
    const springWX=getShuPointWuxing(shiChenIdx,'spring');
    const streamWX=getShuPointWuxing(shiChenIdx,'stream');
    const riverWX=getShuPointWuxing(shiChenIdx,'river');
    const seaWX=getShuPointWuxing(shiChenIdx,'sea');
    return {meridian:naziPoint.meridian,shiChen:SHI_CHEN[shiChenIdx].name,well:{...naziPoint.well,wuXing:wellWX},spring:{...naziPoint.spring,wuXing:springWX},stream:{...naziPoint.stream,wuXing:streamWX},river:{...naziPoint.river,wuXing:riverWX},sea:{...naziPoint.sea,wuXing:seaWX},yuan:naziPoint.yuan,isYangMeridian:isYangMeridian,mainPoint:pairData.main,accompanyPoint:pairData.accompany,supplementPoint:pairData.supplement,drainPoint:pairData.drain,description:SHI_CHEN[shiChenIdx].name+' '+naziPoint.meridian+'当令，主穴'+pairData.main.name+'('+pairData.main.code+')，配穴'+pairData.accompany.name+'('+pairData.accompany.code+')'};
}

function getWuMenShiBian(date) {
    const dayGZ=getDayGanZhi(date);
    const dayGan=dayGZ.gan;
    const info=WUMEN_HE_INFO[dayGan];
    if(!info) return null;
    const partnerGan=info.partnerGan;
    return {dayGan:dayGan,partnerGan:partnerGan,huaWuxing:info.huaWuxing,meridian1:info.meridian1,meridian2:info.meridian2,description:info.desc,formula:dayGan+'('+info.meridian1+') + '+partnerGan+'('+info.meridian2+') → 合化'+info.huaWuxing};
}

function getAllHourAcupointInfo(date) {
    const result=[];
    for(let h=0;h<24;h+=2) {
        const calcHour=(h===0)?23:h-1;
        const tempDate=new Date(date);
        if(h===0) tempDate.setHours(23,0,0,0);
        else tempDate.setHours(calcHour,0,0,0);
        const hgz=getHourGanZhi(tempDate,calcHour);
        const shiChenIdx=hgz.zhiIdx;
        const linggui=getLingGuiBaFa(date,hgz);
        const najia=getZiWuLiuZhuNaJia(date,hgz);
        const nazi=getZiWuLiuZhuNaZi(shiChenIdx);
        let timeRange='';
        switch(shiChenIdx) {
            case 0:timeRange='23:00-01:00';break;case 1:timeRange='01:00-03:00';break;
            case 2:timeRange='03:00-05:00';break;case 3:timeRange='05:00-07:00';break;
            case 4:timeRange='07:00-09:00';break;case 5:timeRange='09:00-11:00';break;
            case 6:timeRange='11:00-13:00';break;case 7:timeRange='13:00-15:00';break;
            case 8:timeRange='15:00-17:00';break;case 9:timeRange='17:00-19:00';break;
            case 10:timeRange='19:00-21:00';break;case 11:timeRange='21:00-23:00';break;
        }
        const shiGanWX=getGanWuXing(hgz.ganIdx);
        const shiZhiWX=getZhiWuXing(hgz.zhiIdx);
        result.push({shiChenIdx:shiChenIdx,shiChenName:SHI_CHEN[shiChenIdx].name,timeRange:timeRange,ganzhi:hgz.ganzhi,shiGan:hgz.gan,shiZhi:hgz.zhi,shiGanYinYang:shiGanWX.yinYang,shiGanWuXing:shiGanWX.wuXing,shiZhiWuXing:shiZhiWX.wuXing,shiZhiYinYang:shiZhiWX.yinYang,meridian:SHI_CHEN[shiChenIdx].meridian,meridianCN:SHI_CHEN[shiChenIdx].meridianCN,linggui:linggui,najia:najia,nazi:nazi,wuXingGan:shiGanWX,wuXingZhi:shiZhiWX});
    }
    return result;
}

const XIU_28 = ['角(蛟)','亢(龙)','氐(貉)','房(兔)','心(狐)','尾(虎)','箕(豹)',
    '斗(獬)','牛(牛)','女(蝠)','虚(鼠)','危(燕)','室(猪)','壁(貐)',
    '奎(狼)','娄(狗)','胃(雉)','昴(鸡)','毕(乌)','觜(猴)','参(猿)',
    '井(犴)','鬼(羊)','柳(獐)','星(马)','张(鹿)','翼(蛇)','轸(蚓)'];

function getDayXiu(date) {
    const base = new Date(1900, 0, 31);
    const diff = Math.floor((date - base) / 86400000);
    const idx = ((diff % 28) + 28) % 28;
    return XIU_28[idx];
}

// =================== app.js ===================
let currentYear, currentMonth;

document.addEventListener('DOMContentLoaded', ()=>{
    const now=new Date();
    currentYear=now.getFullYear();
    currentMonth=now.getMonth();
    loadTheme();
    renderCalendar();
    renderSidebar();
    setupKeyboard();
});

function loadTheme() {
    const t=localStorage.getItem('tcm-calendar-theme');
    if(t) document.documentElement.setAttribute('data-theme',t);
}

function toggleTheme() {
    const cur=document.documentElement.getAttribute('data-theme');
    const next=cur==='dark'?'':'dark';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem('tcm-calendar-theme',next);
}

function setupKeyboard() {
    document.addEventListener('keydown', e=>{
        if(e.key==='Escape') closeModal();
        if(e.key==='ArrowLeft'&&!document.getElementById('modal-overlay').classList.contains('show')) navigateMonth(-1);
        if(e.key==='ArrowRight'&&!document.getElementById('modal-overlay').classList.contains('show')) navigateMonth(1);
        if(e.ctrlKey&&e.key==='t') { e.preventDefault(); goToToday(); }
    });
}

function goToToday() {
    const now=new Date();
    currentYear=now.getFullYear();
    currentMonth=now.getMonth();
    renderCalendar();
    renderSidebar();
}

function navigateMonth(delta) {
    currentMonth+=delta;
    if(currentMonth>11) { currentMonth=0; currentYear++; }
    if(currentMonth<0) { currentMonth=11; currentYear--; }
    renderCalendar();
    renderSidebar();
}

function toggleSidebar() {
    const sb=document.getElementById('sidebar');
    sb.classList.toggle('open');
    let ol=document.querySelector('.sidebar-overlay');
    if(!ol) {
        ol=document.createElement('div');
        ol.className='sidebar-overlay';
        ol.onclick=toggleSidebar;
        document.body.appendChild(ol);
    }
    ol.classList.toggle('show');
}

function renderSidebar() {
    renderTodaySummary(new Date());
    renderWuYunSummary(new Date());
}

function renderCalendar() {
    document.getElementById('current-month-title').textContent = currentYear+'年 '+(currentMonth+1)+'月';
    const grid=document.getElementById('calendar-grid');
    grid.innerHTML='';
    const firstDay=new Date(currentYear,currentMonth,1);
    const startDow=firstDay.getDay();
    const totalDays=new Date(currentYear,currentMonth+1,0).getDate();
    const prevLast=new Date(currentYear,currentMonth,0).getDate();
    for(let i=startDow-1;i>=0;i--) { grid.innerHTML+=buildDayCell(new Date(currentYear,currentMonth-1,prevLast-i),true); }
    for(let d=1;d<=totalDays;d++) { grid.innerHTML+=buildDayCell(new Date(currentYear,currentMonth,d),false); }
    const remain=42-(startDow+totalDays);
    for(let i=1;i<=remain;i++) { grid.innerHTML+=buildDayCell(new Date(currentYear,currentMonth+1,i),true); }
}

function buildDayCell(date, isOther) {
    const dGZ=getDayGanZhi(date);
    const dWx=getGanWuXing(dGZ.ganIdx);
    const dow=date.getDay();
    const isWeekend=dow===0||dow===6;
    const dayNum=date.getDate();
    const naYinDay=getNaYin(dGZ.sexagenaryNum);
    const xiu=getDayXiu(date);
    const lunar=getLunarDate(date);
    let lunarHtml='';
    if(lunar) {
        const special=(lunar.day===1)?' lunar-first':'';
        const midMonth=(lunar.day===15)?' lunar-fifteen':'';
        lunarHtml='<span class="lunar-date'+special+midMonth+'">'+lunar.monthName+lunar.dayName+'</span>';
    }
    const now=new Date(); now.setHours(0,0,0,0);
    const dOnly=new Date(date); dOnly.setHours(0,0,0,0);
    const isToday=dOnly.getTime()===now.getTime();
    const term=getSolarTermOnDate(date);
    let termHtml='';
    if(term) {
        const tClass=term.type==='节'?'jieqi':'solar-term';
        termHtml='<span class="tag '+tClass+'">'+term.name+term.type+'</span>';
    }
    let curShiChenTag='';
    if(isToday) {
        const h=now.getHours();
        let sci;
        if(h>=23||h<1) sci=0;
        else sci=Math.floor((h+1)/2);
        curShiChenTag='<span class="tag current-shichen-tag">'+SHI_CHEN[sci].name+'时</span>';
    }
    const cls=['day-cell',isOther?'other-month':'',isToday?'today':'',isWeekend&&!isOther?'weekend':''].filter(Boolean).join(' ');
    const wxc=getWuXingColor(dWx.wuXingIdx);
    const dateKey=date.getFullYear()+'-'+date.getMonth()+'-'+date.getDate();
    return '<div class="'+cls+'" onclick="openDayDetail(\''+dateKey+'\')" title="'+dGZ.ganzhi+'日 · '+xiu+'"><span class="wuxing-indicator" style="background: var(--'+wxc+')"></span><span class="solar-date">'+dayNum+'</span><span class="ganzhi">'+dGZ.ganzhi+'</span>'+lunarHtml+'<span class="xiu-tag">'+xiu+'</span>'+curShiChenTag+'<div class="tag-row"><span class="tag '+wxc+'">'+dWx.wuXing+dWx.yinYang+'</span>'+(naYinDay?'<span class="tag" style="background:#f0f0f0;color:#666;">'+naYinDay+'</span>':'')+termHtml+'</div></div>';
}

            lgHtml='<span class="na-main">'+lg.acupoint.code+'</span> '+lg.acupoint.name;
            if(lgWx) lgHtml+='<span class="wx-mini wx-'+lgWx+'">'+lgWx+'</span>';
            lgHtml+=' <span title="'+(fi?fi.trigramName:'')+'" style="font-size:1.2em;margin-left:2px;">'+(fi?fi.trigramSymbol:'')+'</span>';
            lgHtml+='<br><small style="color:#888;">'+lg.acupoint.meridian+' · 通'+lg.acupoint.vessel+'</small>';
            if(lg.couple) {
                lgHtml+='<br><span class="lg-couple">配: '+lg.couple.code+' '+lg.couple.name;
                if(cplWx) lgHtml+='<span class="wx-mini wx-'+cplWx+'">'+cplWx+'</span>';
                lgHtml+=' '+lg.couple.trigramSymbol+'</span>';
            }
        }
        let njHtml='-';
        if(h.najia.mainPoint) {
            const pt=h.najia.mainPoint;
            const wuXing=pt.wuXing||'';
            njHtml='<span class="na-main">'+pt.code+'</span> '+pt.name;
            njHtml+='<br><small>'+pt.meridian+' · '+pt.pointType;
            if(wuXing) njHtml+='<span class="wx-mini wx-'+wuXing+'">'+wuXing+'</span>';
            njHtml+='</small>';
            if(h.najia.mainPoint.yuan) {
                const y=h.najia.mainPoint.yuan;
                njHtml+='<span class="na-yuan">返本还原: '+y.code+' '+y.name+' ('+(y.note||'')+')</span>';
            }
            if(h.najia.mainPoint.yuan2) {
                const y2=h.najia.mainPoint.yuan2;
                njHtml+='<span class="na-yuan">'+y2.code+' '+y2.name+' ('+(y2.note||'')+')</span>';
            }
            if(h.najia.mainPoint.note) {
                njHtml+='<span class="na-note">'+h.najia.mainPoint.note+'</span>';
            }
        } else {
            njHtml='<span class="na-closed">闭穴</span>';
        }
        if(h.najia.huyongPoint) {
            const color=h.najia.hasHuyong?'#e67e22':'#888';
            const label=h.najia.hasHuyong?'<span class="huyong-mark">夫妻互用</span>':'合用:';
            const pt=h.najia.huyongPoint;
            const wuXing=pt.wuXing||'';
            const cls=h.najia.hasHuyong?' huyong-real':' huyong-common';
            njHtml+='<br><small style="color:'+color+';" class="'+cls+'">'+label+' '+pt.code+' '+pt.name;
            if(wuXing) njHtml+='<span class="wx-mini wx-'+wuXing+'">'+wuXing+'</span>';
            njHtml+='</small>';
        }
        let nzHtml='-';
        if(h.nazi) {
            nzHtml='<b>主:</b>'+h.nazi.mainPoint.code+' '+h.nazi.mainPoint.name;
            if(h.nazi.mainPoint.wuXing) nzHtml+='<span class="wx-mini wx-'+h.nazi.mainPoint.wuXing+'">'+h.nazi.mainPoint.wuXing+'</span>';
            nzHtml+='<br><span class="nz-accompany">配: '+h.nazi.accompanyPoint.code+' '+h.nazi.accompanyPoint.name;
            if(h.nazi.accompanyPoint.wuXing) nzHtml+='<span class="wx-mini wx-'+h.nazi.accompanyPoint.wuXing+'">'+h.nazi.accompanyPoint.wuXing+'</span>';
            nzHtml+='</span>';
        }
        html+='<tr class="'+trCls.trim()+'"><td><strong>'+h.shiChenName+'</strong></td><td>'+h.timeRange+'</td><td style="font-weight:600;" class="'+(h.shiZhiYinYang==='阳'?'shi-yang':'shi-yin')+'">'+h.ganzhi+'<br><small style="color:#666;font-weight:400;">'+h.shiGan+h.shiGanYinYang+h.shiGanWuXing+'·'+h.shiZhi+h.shiZhiWuXing+'</small></td><td style="color:'+getWuXingColor(h.shiGanWuXing)+';font-weight:600;">'+h.shiGanWuXing+'('+h.shiGanYinYang+')</td><td class="meridian-name">'+h.meridianCN+'<br><small>'+h.meridian+'</small></td><td class="lg-cell">'+lgHtml+'</td><td class="najia-cell" style="font-size:0.78em;">'+njHtml+'</td><td class="nazi-cell" style="font-size:0.78em;">'+nzHtml+'</td></tr>';
    });

    html+='</tbody></table></div></div>';

    html+='<div class="detail-section"><h3>🐢 灵龟八法 · 八脉交会穴配伍</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:12px;padding:14px;">';
    LINGGUI_COUPLES.forEach(cp=>{
        const a=LINGGUI_ACUPOINTS[cp.a];
        const b=LINGGUI_ACUPOINTS[cp.b];
        const fiA=LINGGUI_FULL_INFO[cp.a];
        const fiB=LINGGUI_FULL_INFO[cp.b];
        html+='<div class="trigram-pair-card"><div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px;"><span style="font-weight:700;">'+cp.a+'.'+a.name+' <small style="color:#888;">('+fiA.trigramSymbol+fiA.trigram+')</small></span><span style="font-size:1.3em;color:#bbb;">↔</span><span style="font-weight:700;">'+cp.b+'.'+b.name+' <small style="color:#888;">('+fiB.trigramSymbol+fiB.trigram+')</small></span></div><div style="font-size:0.85em;color:#555;">'+cp.vesselA+' ↔ '+cp.vesselB+'</div><div style="font-size:0.78em;color:#999;">'+cp.relation+'</div></div>';
    });
    html+='</div></div>';

    html+='<div class="detail-section"><h3>💉 纳子法 · 十二经主配穴与补泻</h3><div style="overflow-x:auto;"><table class="hour-table"><thead><tr><th>时辰</th><th>经络</th><th>主穴(输穴)</th><th>配穴(表里)</th><th>补法(母穴)</th><th>泻法(子穴)</th></tr></thead><tbody>';
    allHours.forEach(h=>{
        const nz=h.nazi;
        if(!nz) return;
        const isCur=isTodayCheck&&h.shiChenIdx===curShiChenIdx;
        html+='<tr class="'+(isCur?'hour-current':'')+'"><td>'+h.shiChenName+'</td><td>'+nz.meridian+'</td><td class="acupoint-highlight">'+nz.mainPoint.name+'('+nz.mainPoint.code+')'+(nz.mainPoint.wuXing?'<span class="wx-mini wx-'+nz.mainPoint.wuXing+'">'+nz.mainPoint.wuXing+'</span>':'')+'</td><td>'+nz.accompanyPoint.name+'('+nz.accompanyPoint.code+')'+(nz.accompanyPoint.wuXing?'<span class="wx-mini wx-'+nz.accompanyPoint.wuXing+'">'+nz.accompanyPoint.wuXing+'</span>':'')+'<br><small style="color:#888;">'+nz.accompanyPoint.reason.replace(/[（(].*?[)）]/g,'')+'</small></td><td style="color:#27ae60;">'+nz.supplementPoint.name+'('+nz.supplementPoint.code+')'+(nz.supplementPoint.wuXing?'<span class="wx-mini wx-'+nz.supplementPoint.wuXing+'">'+nz.supplementPoint.wuXing+'</span>':'')+'<br><small>'+nz.supplementPoint.reason+'</small></td><td style="color:#e74c3c;">'+nz.drainPoint.name+'('+nz.drainPoint.code+')'+(nz.drainPoint.wuXing?'<span class="wx-mini wx-'+nz.drainPoint.wuXing+'">'+nz.drainPoint.wuXing+'</span>':'')+'<br><small>'+nz.drainPoint.reason+'</small></td></tr>';
    });
    html+='</tbody></table></div></div>';

    html+='<div class="detail-section"><h3>🖐 五输穴五行属性</h3><div style="font-size:0.78em;padding:10px 14px;color:#888;">阴经：井木→荥火→输土→经金→合水 | 阳经：井金→荥水→输木→经火→合土</div><div style="padding:0 14px 14px;">';
    allHours.forEach(h=>{
        const nz=h.nazi;
        if(!nz) return;
        html+='<div class="wushu-row"><div style="font-weight:700;color:#2c3e50;margin-bottom:4px;">'+h.shiChenName+' '+nz.meridian+'</div><div class="wushu-pills"><span>井<em class="wx-mini wx-'+nz.well.wuXing+'">'+nz.well.wuXing+'</em>'+nz.well.name+'</span><span>荥<em class="wx-mini wx-'+nz.spring.wuXing+'">'+nz.spring.wuXing+'</em>'+nz.spring.name+'</span><span>输<em class="wx-mini wx-'+nz.stream.wuXing+'">'+nz.stream.wuXing+'</em>'+nz.stream.name+'</span><span>经<em class="wx-mini wx-'+nz.river.wuXing+'">'+nz.river.wuXing+'</em>'+nz.river.name+'</span><span>合<em class="wx-mini wx-'+nz.sea.wuXing+'">'+nz.sea.wuXing+'</em>'+nz.sea.name+'</span></div></div>';
    });
    html+='</div></div>';

    html+='<div class="detail-section"><h3>🔄 纳甲法 · 合日互用穴</h3><div style="padding:14px;font-size:0.85em;"><p style="margin-bottom:8px;">'+(NAJIA_HUYONG_INFO[dayGZ.gan]||'天干合化原理')+'</p><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;"><span class="he-gan-item">甲⇌己(土)</span><span class="he-gan-item">乙⇌庚(金)</span><span class="he-gan-item">丙⇌辛(水)</span><span class="he-gan-item">丁⇌壬(木)</span><span class="he-gan-item">戊⇌癸(火)</span></div><p style="margin-top:8px;font-size:0.8em;color:#888;">当本日日干不开某时辰穴位时，可取合日对应时辰的穴位（互用穴表中以<span style="color:#e67e22;">橙色</span>标注）</p></div></div>';

    document.getElementById('modal-body').innerHTML=html;
    document.getElementById('modal-overlay').classList.add('show');
    document.body.style.overflow='hidden';
    requestAnimationFrame(()=>{
        const curRow=document.querySelector('.hour-current');
        if(curRow) curRow.scrollIntoView({block:'center',behavior:'smooth'});
    });
}

function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
    document.body.style.overflow='';
}

// Service Worker
if('serviceWorker' in navigator) {
    try {
        const swBlob = new Blob([
            'var CACHE_NAME="tcm-calendar-v2";' +
            'var ASSETS=["/","/tcm-calendar.html","/index.html"];' +
            'self.addEventListener("install",function(e){e.waitUntil(caches.open(CACHE_NAME).then(function(c){return c.addAll(ASSETS)}))});' +
            'self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request)}))});'
        ], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl);
    } catch(e) {}
}
    </script>
